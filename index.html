function generateMarkdown(allData) {
  const { routine, products, dailyRecords, weeklyRecords } = allData;
  const lines = [];
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  const stamp = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;

  lines.push('# 皮肤诱因日记');
  lines.push('');
  lines.push(`> 导出时间:${stamp}`);
  lines.push('');
  lines.push('---');
  lines.push('');

  // Current routine
  lines.push('## 当前 Routine');
  lines.push('');
  if (routine?.rawMarkdown) {
    lines.push(routine.rawMarkdown);
  } else {
    lines.push('_(未填写)_');
  }
  lines.push('');
  lines.push('---');
  lines.push('');

  // Product library
  lines.push(`## 产品库 (${(products || []).length} 个)`);
  lines.push('');
  const productById = {};
  (products || []).forEach(p => { productById[p.id] = p; });
  if ((products || []).length === 0) {
    lines.push('_(空)_');
  } else {
    const cats = ['cleanser', 'moisturizer', 'sunscreen', 'shampoo', 'supplement', 'other'];
    const catLabels = { cleanser: '洁面', moisturizer: '保湿', sunscreen: '防晒', shampoo: '洗发水', supplement: '营养补剂', other: '其他' };
    cats.forEach(cat => {
      const inCat = (products || []).filter(p => p.category === cat);
      if (inCat.length === 0) return;
      lines.push(`### ${catLabels[cat]}`);
      lines.push('');
      inCat.forEach(p => {
        const note = p.notes ? ` — ${p.notes}` : '';
        lines.push(`- **${p.brand}** ${p.name}${note}`);
      });
      lines.push('');
    });
  }
  lines.push('---');
  lines.push('');

  // Daily records (chronological)
  const dailyDates = Object.keys(dailyRecords || {}).sort();
  lines.push(`## 日记录 (${dailyDates.length} 天)`);
  lines.push('');

  const labelMap = {
    better: '好转', same: '无变化', worse: '恶化',
    none: '没出汗', light: '轻微', medium: '中等', heavy: '大量',
    warm: '温', hot: '热', veryhot: '很烫',
    low: '低', mid: '中', high: '高',
  };
  const productName = id => {
    const p = productById[id];
    return p ? `${p.brand} ${p.name}` : '?';
  };

  dailyDates.forEach(date => {
    const r = dailyRecords[date];
    const dateObj = parseDate(date);
    const wd = ['日', '一', '二', '三', '四', '五', '六'][dateObj.getDay()];
    lines.push(`### ${date} 周${wd}`);
    lines.push('');

    // Skin
    const skin = r.skin || {};
    const skinFields = [
      skin.redness && `泛红 ${labelMap[skin.redness]}`,
      skin.burning && `灼热 ${labelMap[skin.burning]}`,
      skin.itch && `痒 ${labelMap[skin.itch]}`,
      skin.roughness && `粗糙 ${labelMap[skin.roughness]}`,
    ].filter(Boolean);
    if (skinFields.length) lines.push(`- **皮肤状态**:${skinFields.join(' · ')}`);
    if (skin.newPapules) {
      const areas = skin.papuleAreas?.length > 0 ? `(${skin.papuleAreas.join('/')})` : '';
      lines.push(`- **新出丘疹**:有${areas}`);
    }
    if ((skin.photos || []).length > 0) {
      lines.push(`- **照片**:${skin.photos.join(', ')}`);
    }

    // Skincare
    const morning = r.skincare?.morning || {};
    const morningParts = [
      morning.finacea && 'Finacea',
      morning.cleanserId && `洁:${productName(morning.cleanserId)}`,
      morning.moisturizerId && `保湿:${productName(morning.moisturizerId)}`,
      morning.sunscreenId && `防晒:${productName(morning.sunscreenId)}`,
    ].filter(Boolean);
    if (morningParts.length) lines.push(`- **早间**:${morningParts.join(' · ')}`);
    const evening = r.skincare?.evening || {};
    const eveningParts = [
      evening.finacea && 'Finacea',
      evening.cleanserId && `洁:${productName(evening.cleanserId)}`,
      evening.moisturizerId && `保湿:${productName(evening.moisturizerId)}`,
    ].filter(Boolean);
    if (eveningParts.length) lines.push(`- **晚间**:${eveningParts.join(' · ')}`);
    if (r.skincare?.antifungalShampooToday === true) {
      lines.push(`- **抗真菌洗发水**:今天用了`);
    }

    // Diet
    const diet = r.diet || {};
    const dietParts = [];
    const formatItem = (label, item) => item?.detail ? `${label}(${item.detail})` : label;
    if (diet.alcohol?.had) dietParts.push(formatItem('酒精', diet.alcohol));
    if (diet.spicy?.had) dietParts.push(formatItem('辣', diet.spicy));
    if (diet.caffeine?.had) dietParts.push(formatItem('咖啡因', diet.caffeine));
    if (diet.highHistamine?.had) dietParts.push(formatItem('高组胺', diet.highHistamine));
    if (diet.otherSuspect?.had) dietParts.push(formatItem('其他', diet.otherSuspect));
    if (dietParts.length) lines.push(`- **诱因食物**:${dietParts.join(' · ')}`);
    if (diet.hotDrinks?.cups) {
      lines.push(`- **热饮**:${diet.hotDrinks.cups} 杯 · ${labelMap[diet.hotDrinks.temp] || '温'}`);
    }
    if ((diet.supplementIds || []).length > 0) {
      lines.push(`- **营养补剂**:${diet.supplementIds.map(productName).join(', ')}`);
    }

    // Environment
    const env = r.environment || {};
    if (env.outdoorTempC !== undefined && env.outdoorTempC !== null && env.outdoorTempC !== '') {
      lines.push(`- **户外温度**:${env.outdoorTempC}℃`);
    }
    const envParts = [
      env.indoorHVAC && '空调',
      env.tempSwing && '温差',
      env.wind && '风',
      env.dryEnv && '干燥',
      env.sunDirectMin > 0 && `阳光 ${env.sunDirectMin}min`,
    ].filter(Boolean);
    if (envParts.length) lines.push(`- **环境**:${envParts.join(' · ')}`);

    // Physical
    const phys = r.physical || {};
    if (phys.sweating) lines.push(`- **出汗**:${labelMap[phys.sweating]}`);
    const hwParts = [phys.hotShower && '热水澡', phys.hotFaceWash && '热水洗脸'].filter(Boolean);
    if (hwParts.length) lines.push(`- **热水**:${hwParts.join(' · ')}`);
    if (phys.exercise?.had) lines.push(`- **运动**:${phys.exercise.type}(${labelMap[phys.exercise.intensity] || '?'})`);
    if (phys.bedtime) lines.push(`- **上床时间**:${phys.bedtime}`);
    if (phys.stress?.had) lines.push(`- **压力**:${phys.stress.detail || '有'}`);
    if (phys.period?.active) lines.push(`- **月经**:第 ${phys.period.dayN || '?'} 天`);
    if (phys.newTextile) lines.push(`- **新纺织品**:是`);

    // Notes
    if (r.notes) lines.push(`- **备注**:${r.notes}`);

    lines.push('');
  });

  // Weekly records
  const weekKeys = Object.keys(weeklyRecords || {}).sort();
  if (weekKeys.length > 0) {
    lines.push('---');
    lines.push('');
    lines.push(`## 周记录 (${weekKeys.length} 周)`);
    lines.push('');
    const trendLabel = { better: '好转', same: '无变化', fluctuate: '反复', worse: '恶化' };
    weekKeys.forEach(wk => {
      const w = weeklyRecords[wk];
      lines.push(`### ${wk}`);
      lines.push('');
      if (w.trend) lines.push(`- **整体趋势**:${trendLabel[w.trend] || w.trend}`);
      if (w.mainTriggers) lines.push(`- **主要诱因**:${w.mainTriggers}`);
      if (w.routineChange) lines.push(`- **Routine 调整**:${w.routineChange}`);
      if (w.toWatch) lines.push(`- **待观察**:${w.toWatch}`);
      if (w.notes) lines.push(`- **备注**:${w.notes}`);
      lines.push('');
    });
  }

  return lines.join('\n');
}


// ============================================================
// MAIN APP
// ============================================================

function App() {
  const [tab, setTab] = useState('calendar');
  const [calendarYear, setCalendarYear] = useState(new Date().getFullYear());
  const [calendarMonth, setCalendarMonth] = useState(new Date().getMonth());
  const [view, setView] = useState({ name: 'main' });
  const [loaded, setLoaded] = useState(false);

  const [routine, setRoutine] = useState(DEFAULT_ROUTINE);
  const [products, setProducts] = useState([]);
  const [productImages, setProductImages] = useState({});
  const [dailyRecords, setDailyRecords] = useState({});
  const [weeklyRecords, setWeeklyRecords] = useState({});
  const [toast, setToast] = useState({ show: false, message: '' });

  const showToast = (message) => {
    setToast({ show: true, message });
    setTimeout(() => setToast({ show: false, message: '' }), 2000);
  };

  // Load data on mount
  useEffect(() => {
    (async () => {
      const r = await storage.get('routine');
      if (r) setRoutine(r);

      const ps = await storage.getJSON('products');
      if (ps) setProducts(ps);

      // Load product images
      if (ps && ps.length > 0) {
        const imgs = {};
        for (const p of ps) {
          const img = await storage.get(`product_image:${p.id}`);
          if (img) imgs[p.id] = img;
        }
        setProductImages(imgs);
      }

      // Load daily records
      const dailyKeys = await storage.list('daily:');
      const records = {};
      for (const k of dailyKeys) {
        const date = k.replace('daily:', '');
        const data = await storage.getJSON(k);
        if (data) records[date] = data;
      }
      setDailyRecords(records);

      // Load weekly records
      const weeklyKeys = await storage.list('weekly:');
      const weekly = {};
      for (const k of weeklyKeys) {
        const wk = k.replace('weekly:', '');
        const data = await storage.getJSON(k);
        if (data) weekly[wk] = data;
      }
      setWeeklyRecords(weekly);

      setLoaded(true);
    })();
  }, []);

  // Compute use count
  const useCount = (() => {
    const counts = {};
    Object.values(dailyRecords).forEach(r => {
      const used = new Set();
      ['cleanserId', 'moisturizerId', 'sunscreenId'].forEach(k => {
        if (r.skincare?.morning?.[k]) used.add(r.skincare.morning[k]);
        if (r.skincare?.evening?.[k]) used.add(r.skincare.evening[k]);
      });
      (r.diet?.supplementIds || []).forEach(id => used.add(id));
      used.forEach(id => { counts[id] = (counts[id] || 0) + 1; });
    });
    return counts;
  })();

  // Save routine
  const saveRoutine = async (md) => {
    setRoutine(md);
    await storage.set('routine', md);
    showToast('已保存 routine');
  };

  // Save products
  const saveProducts = async (newProducts) => {
    setProducts(newProducts);
    await storage.set('products', newProducts);
  };

  // Save product image
  const saveProductImage = async (id, base64) => {
    setProductImages(prev => ({ ...prev, [id]: base64 }));
    await storage.set(`product_image:${id}`, base64);
  };

  // Save daily record
  const saveDailyRecord = async (date, record) => {
    setDailyRecords(prev => ({ ...prev, [date]: record }));
    await storage.set(`daily:${date}`, record);
    showToast('已保存今日记录');
  };

  // Import all
  const importAll = async (data) => {
    if (data.routine?.rawMarkdown) {
      setRoutine(data.routine.rawMarkdown);
      await storage.set('routine', data.routine.rawMarkdown);
    }
    const newProducts = data.products || [];
    const noImageProducts = newProducts.map(p => {
      const { imageBase64, ...rest } = p;
      return rest;
    });
    setProducts(noImageProducts);
    await storage.set('products', noImageProducts);

    const newImages = {};
    for (const p of newProducts) {
      if (p.imageBase64) {
        newImages[p.id] = p.imageBase64;
        await storage.set(`product_image:${p.id}`, p.imageBase64);
      }
    }
    setProductImages(newImages);

    const newDaily = data.dailyRecords || {};
    setDailyRecords(newDaily);
    for (const [date, record] of Object.entries(newDaily)) {
      await storage.set(`daily:${date}`, record);
    }

    const newWeekly = data.weeklyRecords || {};
    setWeeklyRecords(newWeekly);
    for (const [wk, record] of Object.entries(newWeekly)) {
      await storage.set(`weekly:${wk}`, record);
    }
  };

  const allData = {
    version: '1.0',
    exportedAt: new Date().toISOString(),
    settings: { language: 'zh-CN' },
    routine: { rawMarkdown: routine },
    products: products.map(p => ({
      ...p,
      imageBase64: productImages[p.id] || null,
    })),
    dailyRecords,
    weeklyRecords,
  };

  // Month navigation
  const changeMonth = (delta) => {
    let m = calendarMonth + delta;
    let y = calendarYear;
    if (m < 0) { m = 11; y--; }
    if (m > 11) { m = 0; y++; }
    setCalendarYear(y);
    setCalendarMonth(m);
  };

  const handleDateClick = (date) => {
    setView({ name: 'day-detail', date });
  };

  const startRecording = (date) => {
    const existing = dailyRecords[date];
    setView({ name: 'recording', date, existingRecord: existing });
  };

  const handleRecordingComplete = async (answers) => {
    // Merge with existing record: when a user records only some modules,
    // unchanged modules from existing record are preserved. The RecordingFlow
    // already deep-clones existingRecord into answers when editing, so this
    // mainly protects partial-module recordings on a date that already had data.
    const existing = dailyRecords[view.date];
    let final = answers;
    if (existing) {
      final = {
        skin: { ...(existing.skin || {}), ...(answers.skin || {}) },
        skincare: {
          morning: { ...(existing.skincare?.morning || {}), ...(answers.skincare?.morning || {}) },
          evening: { ...(existing.skincare?.evening || {}), ...(answers.skincare?.evening || {}) },
          antifungalShampooToday: answers.skincare?.antifungalShampooToday !== undefined
            ? answers.skincare.antifungalShampooToday
            : existing.skincare?.antifungalShampooToday,
        },
        diet: {
          ...(existing.diet || {}),
          ...(answers.diet || {}),
          hotDrinks: answers.diet?.hotDrinks ?? existing.diet?.hotDrinks,
          supplementIds: answers.diet?.supplementIds ?? existing.diet?.supplementIds,
        },
        environment: { ...(existing.environment || {}), ...(answers.environment || {}) },
        physical: { ...(existing.physical || {}), ...(answers.physical || {}) },
        notes: answers.notes !== undefined && answers.notes !== '' ? answers.notes : (existing.notes || ''),
      };
    }
    await saveDailyRecord(view.date, final);
    setView({ name: 'main' });
    setTab('calendar');
  };

  const todayDate = formatDate(new Date());

  // Determine if we're on weekly review day (Sunday)
  const today = new Date();
  const isSunday = today.getDay() === 0;

  // ============== RENDER ==============

  if (!loaded) {
    return (
      <div
        className="min-h-screen flex items-center justify-center"
        style={{ backgroundColor: COLORS.canvas, color: COLORS.tertiary }}
      >
        <style>{STYLE_BLOCK}</style>
        <p className="t-body">载入中...</p>
      </div>
    );
  }

  // Weekly review takes over the whole screen
  if (view.name === 'weekly-review') {
    return (
      <div
        style={{
          backgroundColor: COLORS.canvas,
          color: COLORS.primary,
          minHeight: '100vh',
        }}
      >
        <style>{STYLE_BLOCK}</style>
        <WeeklyReviewFlow
          weekKey={view.weekKey}
          existingRecord={weeklyRecords[view.weekKey]}
          dailyRecords={dailyRecords}
          onComplete={async (data) => {
            const newWeekly = { ...weeklyRecords, [view.weekKey]: data };
            setWeeklyRecords(newWeekly);
            await storage.set(`weekly:${view.weekKey}`, data);
            showToast('已保存本周记录');
            setView({ name: 'main' });
            setTab('calendar');
          }}
          onCancel={() => setView({ name: 'main' })}
        />
        <Toast message={toast.message} show={toast.show} />
      </div>
    );
  }

  // Recording flow takes over the whole screen
  if (view.name === 'recording') {
    return (
      <div
        style={{
          backgroundColor: COLORS.canvas,
          color: COLORS.primary,
          minHeight: '100vh',
        }}
      >
        <style>{STYLE_BLOCK}</style>
        <RecordingFlow
          date={view.date}
          existingRecord={view.existingRecord}
          products={products}
          productImages={productImages}
          dailyRecords={dailyRecords}
          onComplete={handleRecordingComplete}
          onCancel={() => setView({ name: 'main' })}
        />
        <Toast message={toast.message} show={toast.show} />
      </div>
    );
  }

  return (
    <div
      style={{
        backgroundColor: COLORS.canvas,
        color: COLORS.primary,
        minHeight: '100vh',
      }}
      className="pb-24"
    >
      <style>{STYLE_BLOCK}</style>

      <div className="max-w-2xl mx-auto px-5 pt-8">
        {/* Calendar Tab */}
        {tab === 'calendar' && view.name === 'main' && (
          <div className="space-y-5">
            <div>
              <span className="t-label" style={{ color: COLORS.tertiary }}>[CALENDAR · {todayDate.replace(/-/g, ' / ')}]</span>
              <h1 className="t-h1 mt-2" style={{ color: COLORS.primary }}>日历概览</h1>
            </div>

            {/* Shampoo reminder banner: shows on Tue (2) or Fri (5) if today not done */}
            {(() => {
              const todayDow = new Date().getDay();
              const isShampooDay = todayDow === 2 || todayDow === 5;
              const todayRec = dailyRecords[todayDate];
              const doneToday = todayRec?.skincare?.antifungalShampooToday === true;
              if (!isShampooDay || doneToday) return null;
              return (
                <Card emphasis>
                  <div className="flex items-start gap-3">
                    <Droplet className="w-5 h-5 mt-0.5" style={{ color: COLORS.accent }} />
                    <div className="flex-1">
                      <p className="text-sm font-medium f-hei" style={{ color: COLORS.primary }}>
                        今天该用酮康唑洗发水了
                      </p>
                      <p className="text-xs mt-1" style={{ color: COLORS.secondary }}>
                        每周建议用 2 次,通常周二 + 周五。完成后在今日记录里勾选。
                      </p>
                    </div>
                  </div>
                </Card>
              );
            })()}

            <MonthCalendar
              year={calendarYear}
              month={calendarMonth}
              dailyRecords={dailyRecords}
              weeklyRecords={weeklyRecords}
              onMonthChange={changeMonth}
              onDateClick={handleDateClick}
            />

            <div className="space-y-3">
              <PrimaryButton fullWidth onClick={() => startRecording(todayDate)} icon={Pencil}>
                {dailyRecords[todayDate] ? '修改今日记录' : '记录今日'}
              </PrimaryButton>
              <OutlineButton
                fullWidth
                onClick={() => {
                  const wk = getWeekKey(new Date());
                  setView({ name: 'weekly-review', weekKey: wk });
                }}
                icon={FileText}
              >
                {weeklyRecords[getWeekKey(new Date())] ? '修改本周记录' : '记录本周'}
              </OutlineButton>
            </div>

            {/* Light legend */}
            <Card>
              <p className="t-label mb-3 block" style={{ color: COLORS.tertiary }}>[图例]</p>
              <div className="flex flex-wrap gap-x-4 gap-y-2">
                {[
                  { c: 'sage', l: '全好转 / 无变化' },
                  { c: 'honey', l: '部分恶化' },
                  { c: 'rose', l: '多数恶化' },
                  { c: 'neutral', l: '无记录' },
                ].map(it => (
                  <div key={it.c} className="flex items-center gap-2">
                    <div
                      style={{ width: '8px', height: '8px', backgroundColor: COLORS[it.c] }}
                      className="rounded-full"
                    />
                    <span className="text-xs" style={{ color: COLORS.secondary }}>{it.l}</span>
                  </div>
                ))}
              </div>
            </Card>
          </div>
        )}

        {tab === 'calendar' && view.name === 'day-detail' && (
          <DayDetail
            date={view.date}
            record={dailyRecords[view.date]}
            products={products}
            productImages={productImages}
            onBack={() => setView({ name: 'main' })}
            onEdit={() => startRecording(view.date)}
          />
        )}

        {/* Care Tab */}
        {tab === 'care' && (
          <CareTab
            routine={routine}
            onSaveRoutine={saveRoutine}
            products={products}
            productImages={productImages}
            onProductsChange={saveProducts}
            onProductImageChange={saveProductImage}
            useCount={useCount}
          />
        )}

        {/* Export Tab */}
        {tab === 'export' && (
          <ExportTab
            allData={allData}
            onImport={importAll}
            showToast={showToast}
          />
        )}
      </div>

      {/* Bottom Tab Bar */}
      <div
        className="fixed bottom-0 left-0 right-0"
        style={{
          backgroundColor: '#EFE5D5',
          height: '64px',
        }}
      >
        <div className="flex h-full max-w-2xl mx-auto">
          {[
            { id: 'calendar', label: '日历概览', icon: CalendarIcon },
            { id: 'care', label: '护理方案', icon: FlaskConical },
            { id: 'export', label: '导出与保存', icon: Save },
          ].map(t => {
            const Icon = t.icon;
            const isActive = tab === t.id;
            return (
              <button
                key={t.id}
                onClick={() => { setTab(t.id); setView({ name: 'main' }); }}
                className="flex-1 relative flex flex-col items-center justify-center gap-1 transition-colors duration-200 active:scale-95"
                style={{ color: isActive ? COLORS.primary : COLORS.tertiary }}
              >
                {isActive && (
                  <div
                    className="absolute top-0 left-1/2 -translate-x-1/2"
                    style={{ width: '32px', height: '2px', backgroundColor: COLORS.accent }}
                  />
                )}
                <Icon className="w-5 h-5" />
                <span className="text-[11px] f-song-bold-narrow">{t.label}</span>
              </button>
            );
          })}
        </div>
      </div>

      <Toast message={toast.message} show={toast.show} />
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
