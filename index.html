const storage = {
  get(key) {
    try { return localStorage.getItem(key); } catch { return null; }
  },
  set(key, value) {
    try {
      const v = typeof value === 'string' ? value : JSON.stringify(value);
      localStorage.setItem(key, v);
      return true;
    } catch (e) {
      console.error('Storage set failed:', e);
      return false;
    }
  },
  getJSON(key) {
    const v = this.get(key);
    if (!v) return null;
    try { return JSON.parse(v); } catch { return null; }
  },
  delete(key) {
    try { localStorage.removeItem(key); return true; } catch { return false; }
  },
  list(prefix) {
    const keys = [];
    try {
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith(prefix)) keys.push(k);
      }
    } catch {}
    return keys;
  }
};

function formatDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function parseDate(s) {
  const [y, m, d] = s.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function getMonthDays(year, month) {
  const first = new Date(year, month, 1);
  const last = new Date(year, month + 1, 0);
  const daysInMonth = last.getDate();
  // Monday-first: Sunday is 0 in JS, so adjust
  let firstDayOfWeek = first.getDay();
  firstDayOfWeek = firstDayOfWeek === 0 ? 6 : firstDayOfWeek - 1;

  const days = [];
  // Previous month padding
  const prevLast = new Date(year, month, 0).getDate();
  for (let i = firstDayOfWeek - 1; i >= 0; i--) {
    days.push({ day: prevLast - i, muted: true, date: null });
  }
  // Current month
  for (let i = 1; i <= daysInMonth; i++) {
    const date = new Date(year, month, i);
    days.push({
      day: i,
      muted: false,
      date: formatDate(date),
      isSunday: date.getDay() === 0,
      dateObj: date,
    });
  }
  // Next month padding
  const remaining = (7 - days.length % 7) % 7;
  for (let i = 1; i <= remaining; i++) {
    days.push({ day: i, muted: true, date: null });
  }
  return days;
}

function computeSkinLight(record) {
  if (!record || !record.skin) return 'neutral';
  const dims = ['redness', 'burning', 'itch', 'roughness'];
  let worse = 0;
  let total = 0;
  dims.forEach(d => {
    if (record.skin[d]) {
      total++;
      if (record.skin[d] === 'worse') worse++;
    }
  });
  if (record.skin.newPapules) {
    total++;
    worse++;
  }
  if (total === 0) return 'neutral';
  if (worse === 0) return 'sage';
  if (worse / total < 0.5) return 'honey';
  return 'rose';
}

async function compressImage(file, maxDim = 200, quality = 0.8) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxDim) {
          height = Math.round(height * maxDim / width);
          width = maxDim;
        } else if (height > maxDim) {
          width = Math.round(width * maxDim / height);
          height = maxDim;
        }
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function Card({ children, className = '', emphasis = false, onClick, style = {}, padding = 'p-5' }) {
  const baseStyle = {
    backgroundColor: emphasis ? COLORS.cardEmphasis : COLORS.card,
    ...style,
  };
  const Tag = onClick ? 'button' : 'div';
  return (
    <Tag
      onClick={onClick}
      style={baseStyle}
      className={`block w-full text-left rounded-2xl ${padding} ${onClick ? 'transition-all duration-200 active:scale-[0.99]' : ''} ${className}`}
    >
      {children}
    </Tag>
  );
}

function PrimaryButton({ children, onClick, disabled, icon: Icon, fullWidth, type = 'button' }) {
  return (
    <button
      type={type}
      onClick={onClick}
      disabled={disabled}
      style={{
        backgroundColor: disabled ? COLORS.muted : COLORS.primary,
        color: COLORS.canvas,

      className={`rounded-xl px-6 py-3 text-sm font-medium transition-all duration-200 active:scale-95 disabled:opacity-50 inline-flex items-center justify-center gap-2 ${fullWidth ? 'w-full' : ''}`}

  );
}

        >

        </button>

        <button
          onClick={() => onMonthChange(1)}

        </button>
      </div>

      <div className="grid grid-cols-7 px-2 pt-3">
        {['一', '二', '三', '四', '五', '六', '日'].map(d => (
          <div
            key={d}
            className="text-center text-xs font-medium py-1 f-hei"
            style={{ color: COLORS.tertiary }}
          >
            {d}
          </div>
        ))}
      </div>

      <div className="grid grid-cols-7 gap-0.5 px-2 pb-3">
        {days.map((d, i) => {
          if (d.muted) {
            return (
              <div key={i} className="aspect-square flex items-center justify-center opacity-30">
                <span className="text-xs f-hei" style={{ color: COLORS.tertiary }}>{d.day}</span>
              </div>
            );
          }
          const record = dailyRecords[d.date];
          const lightKey = computeSkinLight(record);
          const weekly = d.isSunday ? weeklyRecords[getWeekKey(d.dateObj)] : null;

          return (
            <button
              key={i}
              onClick={() => onDateClick(d.date)}
              className="rounded-lg flex flex-col items-center justify-start pt-1.5 pb-1 hover:bg-gray-50 transition-colors active:scale-95"
              style={{ minHeight: d.isSunday && weekly ? '80px' : '54px' }}
            >
              <span className="text-sm font-medium f-hei" style={{ color: COLORS.primary }}>
                {d.day}
              </span>
              <div
                className="rounded-full mt-1.5"
                style={{
                  width: '8px',
                  height: '8px',
                  backgroundColor: lightHex(lightKey),
                }}
              />
              {d.isSunday && weekly && (
                <div
                  className="mt-1 text-center px-0.5 leading-tight"
                  style={{ color: COLORS.secondary, fontSize: '8px' }}
                >
                  <div className="truncate">{weekly.trend || '—'}</div>
                  <div className="truncate mt-0.5">第{weekly.week || '—'}周</div>
                </div>
              )}
            </button>
          );
        })}
      </div>
    </Card>
  );
}

function getWeekKey(date) {
  const d = new Date(date);
  d.setHours(0, 0, 0, 0);
  // Find Monday of current week
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  const year = d.getFullYear();
  // ISO week number
  const jan1 = new Date(year, 0, 1);
  const week = Math.ceil(((d - jan1) / 86400000 + jan1.getDay() + 1) / 7);
  return `${year}-W${String(week).padStart(2, '0')}`;
}

function RecordingFlow({ date, existingRecord, products, productImages, dailyRecords = {}, onComplete, onCancel }) {
  // ===== STATE =====
  const [answers, setAnswers] = useState(() => {
    if (existingRecord) {
      return JSON.parse(JSON.stringify(existingRecord));
    }
    return {
      skin: {}, skincare: { morning: {}, evening: {} },
      diet: {}, environment: {}, physical: {}, notes: '',
    };
  });
  // mode: 'mode-select' (new only) | 'walkthrough' | 'edit-single' | 'preview'
  const [mode, setMode] = useState(existingRecord ? 'preview' : 'mode-select');
  const [activeModules, setActiveModules] = useState(MODULES.map(m => m.id));
  const [step, setStep] = useState(0);
  const [editingScreenId, setEditingScreenId] = useState(null);
  const [dirty, setDirty] = useState(false);
  const [showConfirmExit, setShowConfirmExit] = useState(false);

  const walkthroughScreens = SCREENS.filter(s => activeModules.includes(s.module));

  // Compute this week's shampoo count for ScreenContent
  const shampooWeekCount = (() => {
    const dateObj = parseDate(date);
    const wkKey = getWeekKey(dateObj);
    let count = 0;
    Object.entries(dailyRecords).forEach(([d, rec]) => {
      if (d === date) return;
      if (getWeekKey(parseDate(d)) !== wkKey) return;
      if (rec.skincare?.antifungalShampooToday === true) count++;
    });
    return count;
  })();

  // ===== HANDLERS =====
  const update = (path, value) => {
    setDirty(true);
    setAnswers(prev => {
      const next = { ...prev };
      const parts = path.split('.');
      let cur = next;
      for (let i = 0; i < parts.length - 1; i++) {
        cur[parts[i]] = { ...(cur[parts[i]] || {}) };
        cur = cur[parts[i]];
      }
      cur[parts[parts.length - 1]] = value;
      return next;
    });
  };

  const requestExit = () => {
    if (dirty) setShowConfirmExit(true);
    else onCancel();
  };
  const confirmExit = () => { setShowConfirmExit(false); onCancel(); };

  const next = () => {
    if (step < walkthroughScreens.length - 1) setStep(step + 1);
    else setMode('preview');
  };
  const prev = () => {
    if (step > 0) setStep(step - 1);
    else if (!existingRecord) setMode('mode-select');
  };

  // ===== MODE-SELECT =====
  if (mode === 'mode-select') {
    return (
      <ModeSelector
        date={date}
        onFull={() => {
          setActiveModules(MODULES.map(m => m.id));
          setStep(0);
          setMode('walkthrough');
        }}
        onModulesChosen={(ids) => {
          setActiveModules(ids);
          setStep(0);
          setMode('walkthrough');
        }}
        onCancel={onCancel}
      />
    );
  }

  // ===== WALKTHROUGH =====
  if (mode === 'walkthrough') {
    if (walkthroughScreens.length === 0) {
      // Edge case: no modules selected somehow
      return (
        <div className="p-8 text-center" style={{ color: COLORS.tertiary }}>
          <p className="t-body">没有可记录的模块。</p>
          <PrimaryButton onClick={() => setMode('mode-select')}>返回选择</PrimaryButton>
        </div>
      );
    }
    const cur = walkthroughScreens[step];
    const progress = ((step + 1) / walkthroughScreens.length) * 100;
    const showPrev = step > 0 || !existingRecord;
    return (
      <>
        <div className="min-h-screen flex flex-col">
          <div className="sticky top-0 z-10" style={{ backgroundColor: COLORS.canvas }}>
            <div className="h-0.5" style={{ backgroundColor: '#EDEAE3' }}>
              <div className="h-full transition-all duration-500" style={{ width: `${progress}%`, backgroundColor: COLORS.accent }} />
            </div>
            <div className="flex items-center justify-between px-5 py-4">
              <button
                onClick={requestExit}
                className="flex items-center gap-1 text-sm hover:opacity-70 transition-opacity"
                style={{ color: COLORS.secondary }}
              >
                <ArrowLeft className="w-4 h-4" />
                <span className="f-song-bold-narrow">退回</span>
              </button>
              <span className="text-xs f-hei-narrow" style={{ color: COLORS.tertiary }}>
                {step + 1} / {walkthroughScreens.length}
              </span>
            </div>
          </div>

          <div className="flex-1 px-5 pb-32 pt-2">
            <div className="flex items-baseline gap-3 mb-2">
              <span className="t-en-sm" style={{ color: COLORS.tertiary }}>{String(step + 1).padStart(2, '0')}</span>
              <span className="t-label" style={{ color: COLORS.tertiary }}>[{cur.section}]</span>
            </div>
            <h1 className="t-h2 mb-2" style={{ color: COLORS.primary }}>{cur.title}</h1>
            {cur.sub && <p className="t-body mb-6" style={{ color: COLORS.secondary }}>{cur.sub}</p>}

            <ScreenContent
              screen={cur}
              answers={answers}
              update={update}
              products={products}
              productImages={productImages}
              onAutoNext={next}
              shampooWeekCount={shampooWeekCount}
            />
          </div>

          {!cur.autoNext && (
            <div
              className="fixed bottom-0 left-0 right-0 px-5 py-4"
              style={{ backgroundColor: '#EFE5D5' }}
            >
              <div className="flex gap-3">
                {showPrev && (
                  <OutlineButton onClick={prev} icon={ChevronLeft}>上一题</OutlineButton>
                )}
                <PrimaryButton fullWidth onClick={next} icon={ChevronRight}>
                  {step === walkthroughScreens.length - 1 ? '完成,看预览' : '下一题'}
                </PrimaryButton>
              </div>
            </div>
          )}
        </div>
        {showConfirmExit && <ConfirmExitModal onConfirm={confirmExit} onCancel={() => setShowConfirmExit(false)} />}
      </>
    );
  }

  // ===== EDIT-SINGLE =====
  if (mode === 'edit-single') {
    const screen = SCREENS.find(s => s.id === editingScreenId);
    if (!screen) {
      setMode('preview');
      return null;
    }
    const editDone = () => {
      setEditingScreenId(null);
      setMode('preview');
    };
    return (
      <div className="min-h-screen flex flex-col">
        <div className="sticky top-0 z-10" style={{ backgroundColor: COLORS.canvas }}>
          <div className="flex items-center justify-between px-5 py-4">
            <button
              onClick={editDone}
              className="flex items-center gap-1 text-sm hover:opacity-70 transition-opacity"
              style={{ color: COLORS.secondary }}
            >
              <ArrowLeft className="w-4 h-4" />
              <span className="f-song-bold-narrow">回到预览</span>
            </button>
            <span className="t-label" style={{ color: COLORS.accent }}>[修改中]</span>
          </div>
        </div>

        <div className="flex-1 px-5 pb-32 pt-2">
          <div className="flex items-baseline gap-3 mb-2">
            <span className="t-label" style={{ color: COLORS.tertiary }}>[{screen.section}]</span>
          </div>
          <h1 className="t-h2 mb-2" style={{ color: COLORS.primary }}>{screen.title}</h1>
          {screen.sub && <p className="t-body mb-6" style={{ color: COLORS.secondary }}>{screen.sub}</p>}

          <ScreenContent
            screen={screen}
            answers={answers}
            update={update}
            products={products}
            productImages={productImages}
            onAutoNext={editDone}
            shampooWeekCount={shampooWeekCount}
          />
        </div>

        {!screen.autoNext && (
          <div
            className="fixed bottom-0 left-0 right-0 px-5 py-4"
            style={{ backgroundColor: '#EFE5D5' }}
          >
            <PrimaryButton fullWidth onClick={editDone} icon={Check}>完成修改</PrimaryButton>
          </div>
        )}
      </div>
    );
  }

  // ===== PREVIEW =====
  if (mode === 'preview') {
    return (
      <>
        <RecordingPreview
          date={date}
          answers={answers}
          products={products}
          productImages={productImages}
          activeModules={activeModules}
          onEditScreen={(screenId) => {
            setEditingScreenId(screenId);
            setMode('edit-single');
          }}
          onSubmit={() => onComplete(answers)}
          onExit={requestExit}
        />
        {showConfirmExit && <ConfirmExitModal onConfirm={confirmExit} onCancel={() => setShowConfirmExit(false)} />}
      </>
    );
  }

  return null;
}

// ============================================================
// MODE SELECTOR (one-time vs module-based)
// ============================================================

function ModeSelector({ date, onFull, onModulesChosen, onCancel }) {
  const [picking, setPicking] = useState(false);
  const [selected, setSelected] = useState({});

  const dateObj = parseDate(date);
  const weekday = ['日', '一', '二', '三', '四', '五', '六'][dateObj.getDay()];

  if (picking) {
    const allOn = MODULES.every(m => selected[m.id]);
    const anyOn = MODULES.some(m => selected[m.id]);
    const totalScreens = MODULES.filter(m => selected[m.id]).reduce((a, m) => a + m.screens.length, 0);

    return (
      <div className="min-h-screen pb-32">
        <div className="px-5 pt-6 pb-4 flex items-center justify-between">
          <button
            onClick={() => setPicking(false)}
            className="flex items-center gap-1 text-sm hover:opacity-70"
            style={{ color: COLORS.secondary }}
          >
            <ArrowLeft className="w-4 h-4" />
            <span className="f-song-bold-narrow">返回</span>
          </button>
          <button
            onClick={() => {
              if (allOn) setSelected({});
              else setSelected(MODULES.reduce((a, m) => ({ ...a, [m.id]: true }), {}));
            }}
            className="text-xs hover:opacity-70"
            style={{ color: COLORS.accent }}
          >
            <span className="f-song-bold-narrow">{allOn ? '全不选' : '全选'}</span>
          </button>
        </div>

        <div className="px-5 mb-6">
          <span className="t-label" style={{ color: COLORS.tertiary }}>{date.replace(/-/g, ' / ')} · 周{weekday}</span>
          <h1 className="t-h1 mt-2" style={{ color: COLORS.primary }}>选择记录模块</h1>
          <p className="t-body mt-2" style={{ color: COLORS.secondary }}>
            勾选今天想记录的部分。可以多选,也可以只选一个。
          </p>
        </div>

        <div className="px-5 space-y-3">
          {MODULES.map((m, idx) => {
            const checked = !!selected[m.id];
            return (
              <button
                key={m.id}
                onClick={() => setSelected(prev => ({ ...prev, [m.id]: !checked }))}
                style={{ backgroundColor: checked ? COLORS.accentSoft : COLORS.card }}
                className="w-full rounded-xl p-4 text-left flex items-start gap-3 transition-all"
              >
                <div
                  className="w-5 h-5 rounded flex items-center justify-center flex-shrink-0 mt-0.5"
                  style={{ backgroundColor: checked ? COLORS.accent : COLORS.subtle }}
                >
                  {checked && <Check className="w-3 h-3 text-white" strokeWidth={3} />}
                </div>
                <div className="flex-1">
                  <div className="flex items-baseline gap-2">
                    <span className="t-en-sm" style={{ color: COLORS.tertiary }}>{String(idx + 1).padStart(2, '0')}</span>
                    <span className="text-base font-medium f-hei" style={{ color: COLORS.primary }}>{m.label}</span>
                  </div>
                  <div className="text-xs mt-1" style={{ color: COLORS.secondary }}>{m.desc}</div>
                </div>
                <span className="text-xs f-hei-narrow flex-shrink-0 mt-1" style={{ color: COLORS.tertiary }}>
                  {m.screens.length} 题
                </span>
              </button>
            );
          })}
        </div>

        <div
          className="fixed bottom-0 left-0 right-0 px-5 py-4"
          style={{ backgroundColor: '#EFE5D5' }}
        >
          <PrimaryButton
            fullWidth
            disabled={!anyOn}
            onClick={() => onModulesChosen(Object.keys(selected).filter(k => selected[k]))}
            icon={ChevronRight}
          >
            开始记录 ({totalScreens} 题)
          </PrimaryButton>
        </div>
      </div>
    );
  }

  return (
    <div className="min-h-screen pb-12">
      <div className="px-5 pt-6 pb-4">
        <button
          onClick={onCancel}
          className="flex items-center gap-1 text-sm hover:opacity-70"
          style={{ color: COLORS.secondary }}
        >
          <ArrowLeft className="w-4 h-4" />
          <span className="f-song-bold-narrow">取消</span>
        </button>
      </div>

      <div className="px-5 mb-8">
        <span className="t-label" style={{ color: COLORS.tertiary }}>{date.replace(/-/g, ' / ')} · 周{weekday}</span>
        <h1 className="t-h1 mt-2" style={{ color: COLORS.primary }}>开始记录</h1>
        <p className="t-body mt-2" style={{ color: COLORS.secondary }}>选择记录方式。</p>
      </div>

      <div className="px-5 space-y-4">
        <Card onClick={onFull}>
          <div className="flex items-baseline gap-3 mb-2">
            <span className="t-en" style={{ color: COLORS.tertiary }}>01</span>
            <h2 className="t-h2" style={{ color: COLORS.primary }}>一次性记录</h2>
          </div>
          <p className="t-body" style={{ color: COLORS.secondary }}>
            按顺序走完全部 22 题(约 3-5 分钟)。适合一天结束统一记录。
          </p>
        </Card>

        <Card onClick={() => setPicking(true)}>
          <div className="flex items-baseline gap-3 mb-2">
            <span className="t-en" style={{ color: COLORS.tertiary }}>02</span>
            <h2 className="t-h2" style={{ color: COLORS.primary }}>自选模块记录</h2>
          </div>
          <p className="t-body" style={{ color: COLORS.secondary }}>
            选择想记录的部分(早间护肤、晚间护肤、皮肤状态等)。适合事件刚发生时随手记。
          </p>
        </Card>
      </div>
    </div>
  );
}

// ============================================================
// CONFIRM EXIT MODAL (放弃修改确认)
// ============================================================

function ConfirmExitModal({ onConfirm, onCancel }) {
  return (
    <div
      className="fixed inset-0 z-40 flex items-center justify-center p-4"
      style={{ backgroundColor: 'rgba(31, 45, 38, 0.4)' }}
      onClick={onCancel}
    >
      <div
        className="w-full max-w-md rounded-2xl fade-in"
        style={{ backgroundColor: COLORS.card, padding: '24px' }}
        onClick={e => e.stopPropagation()}
      >
        <h3 className="t-h3 mb-3" style={{ color: COLORS.primary }}>放弃这次修改?</h3>
        <p className="t-body mb-6" style={{ color: COLORS.secondary }}>
          你做了一些修改但还没保存。确认退出会丢失这些改动。
        </p>
        <div className="flex gap-3">
          <OutlineButton fullWidth onClick={onCancel}>继续编辑</OutlineButton>
          <button
            onClick={onConfirm}
            style={{ backgroundColor: COLORS.rose, color: '#FFFFFF' }}
            className="flex-1 rounded-xl px-6 py-3 text-sm font-medium transition-all duration-200 active:scale-95"
          >
            <span className="f-hei">放弃修改</span>
          </button>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// SCREEN CONTENT (per question type)
// ============================================================

function ScreenContent({ screen, answers, update, products, productImages, onAutoNext, shampooWeekCount }) {
  // 1) Compare type
  if (screen.kind === 'compare') {
    const opts = [
      { value: 'better', label: '好转', glyph: '↓' },
      { value: 'same', label: '无变化', glyph: '—' },
      { value: 'worse', label: '恶化', glyph: '↑' },
    ];
    return (
      <div className="space-y-3">
        {opts.map(o => (
          <OptionButton
            key={o.value}
            label={o.label}
            glyph={o.glyph}
            selected={screen.value === o.value}
            onClick={() => {
              update(screen.field, o.value);
              if (screen.autoNext) setTimeout(onAutoNext, 200);
            }}
          />
        ))}
      </div>
    );
  }

  // 2) Papules
  if (screen.kind === 'papules') {
    const has = answers.skin.newPapules;
    const areas = answers.skin.papuleAreas || [];
    const areaOpts = [
      { id: 'cheeks', label: '两颊' },
      { id: 'tzone', label: 'T 区' },
      { id: 'jaw', label: '下颌' },
      { id: 'neck', label: '颈部' },
      { id: 'other', label: '其他' },
    ];
    return (
      <div className="space-y-3">
        <OptionButton
          label="无新增"
          glyph="○"
          selected={has === false}
          onClick={() => {
            update('skin.newPapules', false);
            update('skin.papuleAreas', []);
          }}
        />
        <OptionButton
          label="有新增"
          glyph="●"
          selected={has === true}
          onClick={() => update('skin.newPapules', true)}
        />
        {has === true && (
          <div className="pt-2 space-y-2 fade-in">
            <span className="t-label" style={{ color: COLORS.tertiary }}>[主要区域 · 可多选]</span>
            <div className="flex flex-wrap gap-2 pt-2">
              {areaOpts.map(a => {
                const selected = areas.includes(a.id);
                return (
                  <button
                    key={a.id}
                    onClick={() => {
                      const next = selected ? areas.filter(x => x !== a.id) : [...areas, a.id];
                      update('skin.papuleAreas', next);
                    }}
                    style={{
                      backgroundColor: selected ? COLORS.accentSoft : COLORS.card,
                      color: COLORS.primary,
                    }}
                    className="px-4 py-2 rounded-full text-sm transition-all"
                  >
                    {a.label}
                  </button>
                );
              })}
            </div>
          </div>
        )}
      </div>
    );
  }

  // 3) Photos
  if (screen.kind === 'photos') {
    const photos = answers.skin.photos || [];
    const updatePhoto = (i, val) => {
      const next = [...photos];
      next[i] = val;
      update('skin.photos', next.filter(x => x && x.trim()));
    };
    return (
      <div className="space-y-3">
        {[0, 1, 2].map(i => (
          <TextInput
            key={i}
            value={photos[i] || ''}
            onChange={v => updatePhoto(i, v)}
            placeholder={`照片 ${i + 1} 文件名(可留空)`}
          />
        ))}
        <p className="t-caption" style={{ color: COLORS.tertiary }}>
          填类似 IMG_3893.jpeg 这种文件名,方便日后回看时去相册找。
        </p>
      </div>
    );
  }

  // 4) Skincare morning/evening
  if (screen.kind === 'skincare-morning' || screen.kind === 'skincare-evening') {
    const isM = screen.kind === 'skincare-morning';
    const slot = isM ? 'morning' : 'evening';
    const cur = answers.skincare[slot] || {};
    const updateSlot = (key, val) => update(`skincare.${slot}.${key}`, val);

    const items = isM
      ? [
          { key: 'finacea', type: 'bool', label: 'Finacea' },
          { key: 'cleanserId', type: 'product', label: '洗面奶', cat: 'cleanser' },
          { key: 'moisturizerId', type: 'product', label: '保湿', cat: 'moisturizer' },
          { key: 'sunscreenId', type: 'product', label: '防晒', cat: 'sunscreen' },
        ]
      : [
          { key: 'finacea', type: 'bool', label: 'Finacea' },
          { key: 'cleanserId', type: 'product', label: '洗面奶', cat: 'cleanser' },
          { key: 'moisturizerId', type: 'product', label: '保湿', cat: 'moisturizer' },
        ];

    return (
      <div className="space-y-3">
        {items.map(item => (
          <SkincareRow
            key={item.key}
            item={item}
            value={cur[item.key]}
            onChange={v => updateSlot(item.key, v)}
            products={products}
            productImages={productImages}
          />
        ))}
      </div>
    );
  }

  // 5) Shampoo - boolean per day, auto-aggregated weekly
  if (screen.kind === 'shampoo') {
    // Read pre-existing weekly count from props (passed from RecordingFlow)
    const today = answers.skincare.antifungalShampooToday;
    const weekCountRaw = (typeof shampooWeekCount === 'number') ? shampooWeekCount : 0;
    // adjust for today's tentative answer
    const adjusted = weekCountRaw + (today === true ? 1 : 0);
    return (
      <div className="space-y-3">
        <OptionButton
          label="今天没用"
          glyph="○"
          selected={today === false}
          onClick={() => {
            update('skincare.antifungalShampooToday', false);
            setTimeout(onAutoNext, 200);
          }}
        />
        <OptionButton
          label="今天用了"
          glyph="●"
          selected={today === true}
          onClick={() => {
            update('skincare.antifungalShampooToday', true);
            setTimeout(onAutoNext, 200);
          }}
        />
        <p className="text-xs mt-2" style={{ color: COLORS.tertiary }}>
          本周累计: {adjusted} / 2 次(目标:每周 2 次,通常周二 + 周五)
        </p>
      </div>
    );
  }

  // 6) Diet-1: alcohol/spicy/caffeine/highHistamine/otherSuspect
  if (screen.kind === 'diet-1') {
    const fields = [
      { key: 'alcohol', label: '酒精', icon: Wine, placeholder: '红酒一杯/啤酒一瓶等' },
      { key: 'spicy', label: '辣食', icon: Flame, placeholder: '川菜/咖喱等' },
      { key: 'caffeine', label: '咖啡因', icon: Coffee, placeholder: '咖啡 200ml/抹茶 1 杯等' },
      { key: 'highHistamine', label: '高组胺食物', icon: AlertCircle, placeholder: '陈奶酪/发酵/番茄等' },
      { key: 'otherSuspect', label: '其他怀疑食物', icon: AlertCircle, placeholder: '描述...' },
    ];
    return (
      <div className="space-y-3">
        {fields.map(f => (
          <DietRow
            key={f.key}
            field={f}
            value={answers.diet[f.key]}
            onChange={v => update(`diet.${f.key}`, v)}
          />
        ))}
      </div>
    );
  }

  // 7) Hot drinks
  if (screen.kind === 'hotdrinks') {
    const hd = answers.diet.hotDrinks || { cups: 0, temp: 'warm' };
    const cupsOpts = [
      { v: 0, label: '没喝' },
      { v: 1, label: '1 杯' },
      { v: 2, label: '2 杯' },
      { v: 3, label: '3 杯或更多' },
    ];
    const tempOpts = [
      { v: 'warm', label: '温(不烫嘴)' },
      { v: 'hot', label: '热(微烫)' },
      { v: 'veryhot', label: '很烫' },
    ];
    return (
      <div className="space-y-5">
        <div>
          <span className="t-label mb-3 block" style={{ color: COLORS.tertiary }}>[杯数]</span>
          <div className="space-y-2">
            {cupsOpts.map(o => (
              <OptionButton
                key={o.v}
                label={o.label}
                selected={hd.cups === o.v}
                onClick={() => update('diet.hotDrinks', { ...hd, cups: o.v })}
              />
            ))}
          </div>
        </div>
        {hd.cups > 0 && (
          <div className="fade-in">
            <span className="t-label mb-3 block" style={{ color: COLORS.tertiary }}>[温度]</span>
            <div className="space-y-2">
              {tempOpts.map(o => (
                <OptionButton
                  key={o.v}
                  label={o.label}
                  selected={hd.temp === o.v}
                  onClick={() => update('diet.hotDrinks', { ...hd, temp: o.v })}
                />
              ))}
            </div>
          </div>
        )}
      </div>
    );
  }

  // 8) Supplements
  if (screen.kind === 'supplements') {
    const ids = answers.diet.supplementIds || [];
    const supplements = products.filter(p => p.category === 'supplement');
    return (
      <div className="space-y-3">
        {supplements.length === 0 && (
          <Card emphasis>
            <p className="t-body" style={{ color: COLORS.secondary }}>
              你的产品库里还没有营养补剂。先跳过此题,可以在「护理方案」标签页里添加。
            </p>
          </Card>
        )}
        {supplements.map(s => {
          const selected = ids.includes(s.id);
          return (
            <button
              key={s.id}
              onClick={() => {
                const next = selected ? ids.filter(x => x !== s.id) : [...ids, s.id];
                update('diet.supplementIds', next);
              }}
              style={{
                backgroundColor: selected ? COLORS.accentSoft : COLORS.card,
              }}
              className="w-full rounded-xl p-4 text-left flex items-center gap-3 transition-all"
            >
              <div
                className="w-10 h-10 rounded-lg flex items-center justify-center overflow-hidden"
                style={{ backgroundColor: COLORS.subtle }}

                  <img src={productImages[s.id]} alt="" className="w-full h-full object-cover" />

                  <Sparkles className="w-4 h-4" style={{ color: COLORS.tertiary }} />

  // 9) Outdoor temp
  if (screen.kind === 'outdoor-temp') {
    return (
      <div className="space-y-3">
        <div className="flex items-center gap-3">
          <input
            type="number"
            value={answers.environment.outdoorTempC ?? ''}
            onChange={e => {
              const v = e.target.value === '' ? null : Number(e.target.value);
              update('environment.outdoorTempC', v);
            }}
            placeholder="温度"
            style={{ backgroundColor: COLORS.subtle, color: COLORS.primary }}
            className="flex-1 rounded-lg px-4 py-3 text-base outline-none border-transparent focus:bg-white focus:ring-2 focus:ring-purple-100"

        </div>
      </div>
    );

  // 10) Environment checkboxes
  if (screen.kind === 'environment') {
    const env = answers.environment;
    const items = [
      { key: 'indoorHVAC', label: '室内开了暖气或空调' },
      { key: 'tempSwing', label: '经历明显冷热温差(>10℃ 切换)' },
      { key: 'wind', label: '有大风' },
      { key: 'dryEnv', label: '环境干燥' },
    ];
    return (
      <div className="space-y-3">
        {items.map(item => {
          const checked = !!env[item.key];
          return (
            <button
              key={item.key}
              onClick={() => update(`environment.${item.key}`, !checked)}
              style={{
                backgroundColor: checked ? COLORS.accentSoft : COLORS.card,
              }}
              className="w-full rounded-xl p-4 text-left flex items-center gap-3 transition-all"
            >
              <div
                className="w-5 h-5 rounded flex items-center justify-center flex-shrink-0"
                style={{
                  backgroundColor: checked ? COLORS.accent : COLORS.subtle,
                }}
              >
                {checked && <Check className="w-3 h-3 text-white" strokeWidth={3} />}
              </div>
              <span className="text-sm" style={{ color: COLORS.primary }}>{item.label}</span>
            </button>
          );
        })}
        {/* Sun direct exposure */}
        <div className="pt-3 space-y-2">
          <span className="t-label" style={{ color: COLORS.tertiary }}>[阳光直射 · 分钟]</span>
          <div className="flex items-center gap-3">
            <input
              type="number"
              value={env.sunDirectMin ?? ''}
              onChange={e => {
                const v = e.target.value === '' ? 0 : Number(e.target.value);
                update('environment.sunDirectMin', v);
              }}
              placeholder="0"
              style={{ backgroundColor: COLORS.subtle, color: COLORS.primary }}
              className="flex-1 rounded-lg px-4 py-3 text-sm outline-none border-transparent focus:bg-white focus:ring-2 focus:ring-purple-100"
            />
            <span className="text-sm" style={{ color: COLORS.tertiary }}>分钟</span>
          </div>
          {env.sunDirectMin > 0 && (
            <div className="flex gap-2 pt-1 fade-in">
              {[
                { v: true, label: '有防晒' },
                { v: false, label: '无防晒' },
              ].map(o => (
                <button
                  key={String(o.v)}
                  onClick={() => update('environment.sunWithSPF', o.v)}
                  style={{
                    backgroundColor: env.sunWithSPF === o.v ? COLORS.accentSoft : COLORS.card,
                    color: COLORS.primary,
                  }}
                  className="flex-1 px-4 py-2 rounded-full text-sm transition-all"

                  {o.label}
                </button>
              ))}
            </div>

        </div>
      </div>
    );

  // 11) Sweating
  if (screen.kind === 'sweating') {
    const opts = [
      { v: 'none', label: '没出汗' },
      { v: 'light', label: '轻微出汗' },
      { v: 'medium', label: '中等出汗' },
      { v: 'heavy', label: '大量出汗' },
    ];
    return (
      <div className="space-y-3">
        {opts.map(o => (
          <OptionButton
            key={o.v}
            label={o.label}
            selected={answers.physical.sweating === o.v}
            onClick={() => {
              update('physical.sweating', o.v);
              setTimeout(onAutoNext, 200);
            }}
          />
        ))}
      </div>
    );
  }

  // 12) Hot water
  if (screen.kind === 'hotwater') {
    const items = [
      { key: 'hotShower', label: '洗了热水澡' },
      { key: 'hotFaceWash', label: '用热水洗了脸' },
    ];
    return (
      <div className="space-y-3">
        {items.map(item => {
          const checked = !!answers.physical[item.key];
          return (
            <button
              key={item.key}
              onClick={() => update(`physical.${item.key}`, !checked)}
              style={{
                backgroundColor: checked ? COLORS.accentSoft : COLORS.card,
              }}
              className="w-full rounded-xl p-4 text-left flex items-center gap-3 transition-all"
            >
              <div
                className="w-5 h-5 rounded flex items-center justify-center flex-shrink-0"
                style={{
                  backgroundColor: checked ? COLORS.accent : COLORS.subtle,
                }}
              >
                {checked && <Check className="w-3 h-3 text-white" strokeWidth={3} />}
              </div>
              <span className="text-sm" style={{ color: COLORS.primary }}>{item.label}</span>
            </button>
          );
        })}
      </div>
    );
  }

  // 13) Exercise
  if (screen.kind === 'exercise') {
    const ex = answers.physical.exercise || { had: false, type: '', intensity: '' };
    return (
      <div className="space-y-3">
        <OptionButton
          label="没运动"
          glyph="○"
          selected={ex.had === false}
          onClick={() => update('physical.exercise', { had: false, type: '', intensity: '' })}
        />
        <OptionButton
          label="有运动"
          glyph="●"
          selected={ex.had === true}
          onClick={() => update('physical.exercise', { ...ex, had: true })}
        />
        {ex.had && (
          <div className="pt-2 space-y-3 fade-in">
            <div>
              <span className="t-label mb-2 block" style={{ color: COLORS.tertiary }}>[类型]</span>
              <TextInput
                value={ex.type}
                onChange={v => update('physical.exercise', { ...ex, type: v })}
                placeholder="跑步/瑜伽/力量训练等"
              />
            </div>
            <div>
              <span className="t-label mb-2 block" style={{ color: COLORS.tertiary }}>[强度]</span>
              <div className="flex gap-2">
                {[
                  { v: 'low', label: '低' },
                  { v: 'mid', label: '中' },
                  { v: 'high', label: '高' },
                ].map(o => (
                  <button
                    key={o.v}
                    onClick={() => update('physical.exercise', { ...ex, intensity: o.v })}
                    style={{
                      backgroundColor: ex.intensity === o.v ? COLORS.accentSoft : COLORS.card,
                      color: COLORS.primary,
                    }}
                    className="flex-1 px-4 py-2 rounded-full text-sm transition-all"
                  >
                    {o.label}
                  </button>
                ))}
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  // 14) Bedtime
  if (screen.kind === 'bedtime') {
    return (
      <div>
        <input
          type="time"
          value={answers.physical.bedtime || ''}
          onChange={e => update('physical.bedtime', e.target.value)}
          style={{ backgroundColor: COLORS.subtle, color: COLORS.primary }}
          className="w-full rounded-lg px-4 py-3 text-base outline-none border-transparent focus:bg-white focus:ring-2 focus:ring-purple-100"
        />
        <p className="t-caption mt-3" style={{ color: COLORS.tertiary }}>
          长期睡眠不足会影响皮肤屏障修复。
        </p>
      </div>
    );
  }

  // 15) Stress
  if (screen.kind === 'stress') {
    const s = answers.physical.stress || { had: false, detail: '' };
    return (
      <div className="space-y-3">
        <OptionButton
          label="还行"
          glyph="○"
          selected={s.had === false}
          onClick={() => update('physical.stress', { had: false, detail: '' })}
        />
        <OptionButton
          label="压力较大"
          glyph="●"
          selected={s.had === true}
          onClick={() => update('physical.stress', { ...s, had: true })}
        />
        {s.had && (
          <div className="pt-2 fade-in">
            <TextArea
              value={s.detail}
              onChange={v => update('physical.stress', { ...s, detail: v })}
              placeholder="什么事情(可留空)"
              rows={3}
            />
          </div>
        )}
      </div>
    );
  }

  // 16) Period
  if (screen.kind === 'period') {
    const p = answers.physical.period || { active: false, dayN: null };
    return (
      <div className="space-y-3">
        <OptionButton
          label="不在月经期"
          glyph="○"
          selected={p.active === false}
          onClick={() => update('physical.period', { active: false, dayN: null })}
        />
        <OptionButton
          label="月经期中"
          glyph="●"
          selected={p.active === true}
          onClick={() => update('physical.period', { ...p, active: true })}
        />
        {p.active && (
          <div className="pt-2 fade-in">
            <span className="t-label mb-2 block" style={{ color: COLORS.tertiary }}>[本次月经第几天]</span>
            <div className="flex items-center gap-3">
              <input
                type="number"
                min="1"
                max="14"
                value={p.dayN ?? ''}
                onChange={e => {
                  const v = e.target.value === '' ? null : Number(e.target.value);
                  update('physical.period', { ...p, dayN: v });
                }}
                placeholder="1"
                style={{ backgroundColor: COLORS.subtle, color: COLORS.primary }}
                className="flex-1 rounded-lg px-4 py-3 text-base outline-none border-transparent focus:bg-white focus:ring-2 focus:ring-purple-100"
              />
              <span className="text-sm" style={{ color: COLORS.tertiary }}>第几天</span>
            </div>
          </div>
        )}
      </div>
    );
  }

  // 17) New textile
  if (screen.kind === 'textile') {
    const v = answers.physical.newTextile;
    return (
      <div className="space-y-3">
        <OptionButton
          label="没有"
          glyph="○"
          selected={v === false}
          onClick={() => {
            update('physical.newTextile', false);
            setTimeout(onAutoNext, 200);
          }}
        />
        <OptionButton
          label="接触了"
          glyph="●"
          selected={v === true}
          onClick={() => {
            update('physical.newTextile', true);
            setTimeout(onAutoNext, 200);
          }}
        />
      </div>
    );
  }

  // 18) Notes
  if (screen.kind === 'notes') {
    return (
      <TextArea
        value={answers.notes || ''}
        onChange={v => update('notes', v)}
        placeholder="今日特殊情况、跟昨天比较、其他观察..."
        rows={6}
      />
    );
  }

  return null;
}

  if (item.type === 'bool') {
    const checked = !!value;
    return (
      <button
        onClick={() => onChange(!checked)}
        style={{
          backgroundColor: checked ? COLORS.accentSoft : COLORS.card,
        }}
        className="w-full rounded-xl p-4 text-left flex items-center gap-3 transition-all"
      >
        <div
          className="w-5 h-5 rounded flex items-center justify-center flex-shrink-0"
          style={{
            backgroundColor: checked ? COLORS.accent : COLORS.subtle,
          }}
        >
          {checked && <Check className="w-3 h-3 text-white" strokeWidth={3} />}
        </div>
        <Pill className="w-4 h-4" style={{ color: COLORS.tertiary }} />
        <span className="text-sm font-medium" style={{ color: COLORS.primary }}>{item.label}</span>

          className="w-10 h-10 rounded-lg flex items-center justify-center overflow-hidden flex-shrink-0"

            <Package className="w-4 h-4" style={{ color: COLORS.tertiary }} />

        <div className="flex-1 min-w-0">
          <div className="text-sm font-medium" style={{ color: COLORS.primary }}>{item.label}</div>
          {selected ? (
            <div className="text-xs truncate" style={{ color: COLORS.secondary }}>
              {selected.brand} · {selected.name}

          ) : (
            <div className="text-xs" style={{ color: COLORS.tertiary }}>未选择 · 跳过此项</div>
          )}
        </div>
        <ChevronRight className="w-4 h-4 flex-shrink-0" style={{ color: COLORS.tertiary }} />

      <Modal open={pickerOpen} onClose={() => setPickerOpen(false)} title={`选择${item.label}`}>
        <div className="p-4 max-h-[60vh] overflow-y-auto space-y-2">

            onClick={() => { onChange(null); setPickerOpen(false); }}
            className="w-full rounded-lg p-3 text-left text-sm transition-all"
            style={{ color: COLORS.secondary }}
          >
            ○ 跳过此项(今天没用)
          </button>
          {filtered.length === 0 && (
            <p className="text-center text-sm py-6" style={{ color: COLORS.tertiary }}>
              产品库中还没有此类产品。
              <br />
              请在「护理方案」标签页里添加。
            </p>
          )}
          {filtered.map(p => {
            const isSelected = value === p.id;
            return (
              <button
                key={p.id}
                onClick={() => { onChange(p.id); setPickerOpen(false); }}
                style={{
                  backgroundColor: isSelected ? COLORS.accentSoft : COLORS.card,
                }}
                className="w-full rounded-lg p-3 text-left flex items-center gap-3 transition-all"
              >
                <div
                  className="w-10 h-10 rounded-lg flex items-center justify-center overflow-hidden"
                  style={{ backgroundColor: COLORS.subtle }}
                >
                  {productImages[p.id] ? (
                    <img src={productImages[p.id]} alt="" className="w-full h-full object-cover" />
                  ) : (
                    <Package className="w-4 h-4" style={{ color: COLORS.tertiary }} />
                  )}
                </div>
                <div className="flex-1 min-w-0">
                  <div className="text-sm font-medium" style={{ color: COLORS.primary }}>{p.brand}</div>
                  <div className="text-xs truncate" style={{ color: COLORS.secondary }}>{p.name}</div>
                </div>
              </button>
            );
          })}
        </div>
      </Modal>
    </>
  );
}

function RecordingPreview({ date, answers, products, productImages, activeModules, onEditScreen, onSubmit, onExit }) {
  const dateObj = parseDate(date);
  const weekday = ['日', '一', '二', '三', '四', '五', '六'][dateObj.getDay()];
  const labelMap = {
    better: '好转', same: '无变化', worse: '恶化',
    none: '没出汗', light: '轻微', medium: '中等', heavy: '大量',
    warm: '温', hot: '热', veryhot: '很烫',
    low: '低', mid: '中', high: '高',
  };

  const moduleSet = new Set(activeModules || MODULES.map(m => m.id));

  const Row = ({ label, value, screenId }) => (
    <button
      onClick={() => onEditScreen(screenId)}
      className="flex justify-between items-start w-full hover:bg-gray-50 px-2 py-2 rounded transition-colors gap-2"
    >
      <span className="flex-shrink-0" style={{ color: COLORS.secondary }}>{label}</span>
      <span
        className="text-right break-words"
        style={{ color: value ? COLORS.primary : COLORS.tertiary }}
      >
        {value || '未填'}
      </span>
    </button>
  );

  // Diet 诱因 detail builder (with detail text)
  const dietDetailText = (() => {
    const parts = [];
    const formatItem = (label, item) => item?.detail ? `${label}(${item.detail})` : label;
    if (answers.diet?.alcohol?.had) parts.push(formatItem('酒精', answers.diet.alcohol));
    if (answers.diet?.spicy?.had) parts.push(formatItem('辣', answers.diet.spicy));
    if (answers.diet?.caffeine?.had) parts.push(formatItem('咖啡因', answers.diet.caffeine));
    if (answers.diet?.highHistamine?.had) parts.push(formatItem('高组胺', answers.diet.highHistamine));
    if (answers.diet?.otherSuspect?.had) parts.push(formatItem('其他', answers.diet.otherSuspect));
    return parts.join(' · ') || '无';
  })();

  let sectionNum = 0;
  const next = () => String(++sectionNum).padStart(2, '0');

  return (
    <div className="min-h-screen pb-32">
      <div className="px-5 pt-6 pb-4 flex items-center justify-between">
        <button
          onClick={onExit}
          className="flex items-center gap-1 text-sm hover:opacity-70 transition-opacity"
          style={{ color: COLORS.secondary }}
        >
          <ArrowLeft className="w-4 h-4" />
          <span className="f-song-bold-narrow">退回</span>
        </button>
        <span className="t-label" style={{ color: COLORS.tertiary }}>[预览]</span>
      </div>

      <div className="px-5 mb-6">
        <span className="t-label" style={{ color: COLORS.tertiary }}>{date.replace(/-/g, ' / ')} · 周{weekday}</span>
        <h1 className="t-h1 mt-2" style={{ color: COLORS.primary }}>记录预览</h1>
        <p className="t-body mt-2" style={{ color: COLORS.secondary }}>
          点击任一栏目可直接修改。点"保存记录"提交。
        </p>
      </div>

      <div className="px-5 space-y-4">
        {/* Skin */}
        {moduleSet.has('skin') && (
          <Card>
            <div className="flex items-baseline gap-3 mb-3">
              <span className="t-en-sm" style={{ color: COLORS.tertiary }}>{next()}</span>
              <h3 className="t-h3" style={{ color: COLORS.primary }}>皮肤状态</h3>
            </div>
            <div className="space-y-1 text-sm">
              <Row label="泛红" value={answers.skin?.redness ? labelMap[answers.skin.redness] : null} screenId="redness" />
              <Row label="灼热刺痛" value={answers.skin?.burning ? labelMap[answers.skin.burning] : null} screenId="burning" />
              <Row label="痒感" value={answers.skin?.itch ? labelMap[answers.skin.itch] : null} screenId="itch" />
              <Row label="粗糙度" value={answers.skin?.roughness ? labelMap[answers.skin.roughness] : null} screenId="roughness" />
              <Row label="新出丘疹" value={
                answers.skin?.newPapules === undefined ? null :
                  answers.skin.newPapules
                    ? `有${answers.skin.papuleAreas?.length > 0 ? ' · ' + answers.skin.papuleAreas.join('/') : ''}`
                    : '无'
              } screenId="papules" />
              <Row label="照片" value={(answers.skin?.photos || []).length > 0 ? `${answers.skin.photos.length} 张` : '无'} screenId="photos" />
            </div>
          </Card>
        )}

        {/* Skincare (morning + evening + shampoo combined card) */}
        {(moduleSet.has('morning') || moduleSet.has('evening')) && (
          <Card>
            <div className="flex items-baseline gap-3 mb-3">
              <span className="t-en-sm" style={{ color: COLORS.tertiary }}>{next()}</span>
              <h3 className="t-h3" style={{ color: COLORS.primary }}>用药与护肤</h3>
            </div>
            <div className="space-y-1 text-sm">
              {moduleSet.has('morning') && (
                <Row label="早间" value={
                  [
                    answers.skincare?.morning?.finacea && 'Finacea',
                    answers.skincare?.morning?.cleanserId && '洁',
                    answers.skincare?.morning?.moisturizerId && '保湿',
                    answers.skincare?.morning?.sunscreenId && '防晒',
                  ].filter(Boolean).join(' · ') || null
                } screenId="skincare-morning" />
              )}
              {moduleSet.has('evening') && (
                <>
                  <Row label="晚间" value={
                    [
                      answers.skincare?.evening?.finacea && 'Finacea',
                      answers.skincare?.evening?.cleanserId && '洁',
                      answers.skincare?.evening?.moisturizerId && '保湿',
                    ].filter(Boolean).join(' · ') || null
                  } screenId="skincare-evening" />
                  <Row label="抗真菌洗发水" value={
                    answers.skincare?.antifungalShampooToday === undefined ? null :
                      answers.skincare.antifungalShampooToday ? '今天用了' : '今天没用'
                  } screenId="shampoo" />
                </>
              )}
            </div>
          </Card>
        )}

function CareTab({ routine, onSaveRoutine, products, productImages, onProductsChange, onProductImageChange, useCount }) {
  const [routineEditing, setRoutineEditing] = useState(false);
  const [routineDraft, setRoutineDraft] = useState(routine);
  const [productView, setProductView] = useState('main'); // main | edit | add | edit-product
  const [editingProductId, setEditingProductId] = useState(null);

  const renderRoutineMD = (md) => {
    // Simple markdown rendering for **bold** and lists
    return md.split('\n').map((line, i) => {
      const renderInline = (text) => {
        const parts = text.split(/(\*\*[^*]+\*\*)/g);
        return parts.map((p, j) => {
          if (p.startsWith('**') && p.endsWith('**')) {
            return <strong key={j} style={{ color: COLORS.primary, fontWeight: 700 }}>{p.slice(2, -2)}</strong>;
          }
          return <span key={j}>{p}</span>;
        });
      };
      if (line.match(/^\d+\./)) {
        return <li key={i} className="ml-4 mt-1">{renderInline(line.replace(/^\d+\.\s*/, ''))}</li>;
      }
      if (line.trim() === '') return <br key={i} />;
      return <div key={i} className="mt-2">{renderInline(line)}</div>;
    });
  };

  const topProducts = [...products]
    .map(p => ({ ...p, count: useCount[p.id] || 0 }))
    .sort((a, b) => b.count - a.count)
    .slice(0, 8);

  if (productView === 'add' || (productView === 'edit' && editingProductId === 'new')) {
    return <ProductAddPage
      onSave={async (newProducts) => {
        const updated = [...products, ...newProducts];
        await onProductsChange(updated);
        setProductView('edit');
      }}
      onCancel={() => setProductView('edit')}
      onImageChange={onProductImageChange}
    />;
  }

  if (productView === 'edit-product' && editingProductId) {
    const editingProduct = products.find(p => p.id === editingProductId);
    if (!editingProduct) {
      // Product was deleted, fallback
      setProductView('edit');
      return null;
    }
    return <ProductEditForm
      product={editingProduct}
      currentImage={productImages[editingProduct.id]}
      onSave={async (updated) => {
        const newProducts = products.map(p => p.id === updated.id ? updated : p);
        await onProductsChange(newProducts);
        setEditingProductId(null);
        setProductView('edit');
      }}
      onCancel={() => { setEditingProductId(null); setProductView('edit'); }}
      onImageChange={onProductImageChange}
    />;
  }

  if (productView === 'edit') {
    return <ProductEditPage
      products={products}
      productImages={productImages}
      onDelete={async (id) => {
        await onProductsChange(products.filter(p => p.id !== id));
      }}
      onAddNew={() => setProductView('add')}
      onBack={() => setProductView('main')}
      onEditProduct={(id) => { setEditingProductId(id); setProductView('edit-product'); }}
    />;
  }

  if (routineEditing) {
    return (
      <div className="space-y-4">
        <div className="flex items-center justify-between">
          <button
            onClick={() => { setRoutineDraft(routine); setRoutineEditing(false); }}
            className="flex items-center gap-1 text-sm hover:opacity-70"
            style={{ color: COLORS.secondary }}
          >
            <ArrowLeft className="w-4 h-4" />
            <span className="f-song-bold-narrow">取消</span>
          </button>
          <PrimaryButton onClick={() => { onSaveRoutine(routineDraft); setRoutineEditing(false); }} icon={Check}>
            保存
          </PrimaryButton>
        </div>
        <h1 className="t-h2" style={{ color: COLORS.primary }}>编辑 routine</h1>
        <p className="t-caption" style={{ color: COLORS.tertiary }}>
          支持 Markdown:**粗体**、emoji、有序列表
        </p>
        <textarea
          value={routineDraft}
          onChange={e => setRoutineDraft(e.target.value)}
          rows={20}
          style={{
            backgroundColor: COLORS.subtle,
            color: COLORS.primary,
            fontFamily: '"ChillHuoSong_F", monospace',
          }}
          className="w-full rounded-xl px-4 py-3 text-sm outline-none focus:bg-white focus:ring-2 focus:ring-purple-100 resize-none"
        />
      </div>
    );
  }

  return (
    <div className="space-y-6">
      <div>
        <span className="t-label" style={{ color: COLORS.tertiary }}>[CARE PLAN]</span>
        <h1 className="t-h1 mt-2" style={{ color: COLORS.primary }}>护理方案</h1>
      </div>

      {/* Routine */}
      <div>
        <div className="flex items-baseline justify-between mb-3">
          <div className="flex items-baseline gap-3">
            <span className="t-en-sm" style={{ color: COLORS.tertiary }}>01</span>
            <h2 className="t-h2" style={{ color: COLORS.primary }}>当前 routine</h2>
          </div>
          <button
            onClick={() => setRoutineEditing(true)}
            className="text-xs hover:opacity-70 transition-opacity flex items-center gap-1"
            style={{ color: COLORS.accent }}
          >
            <Edit3 className="w-3.5 h-3.5" />
            <span className="f-song-bold-narrow">编辑</span>
          </button>
        </div>
        <Card emphasis>
          <div className="t-body" style={{ color: COLORS.primary }}>
            {renderRoutineMD(routine)}
          </div>
        </Card>

      {/* Product library */}
      <div>
        <div className="flex items-baseline justify-between mb-3">
          <div className="flex items-baseline gap-3">
            <span className="t-en-sm" style={{ color: COLORS.tertiary }}>02</span>
            <h2 className="t-h2" style={{ color: COLORS.primary }}>产品库</h2>

        {topProducts.length === 0 ? (

              <p className="t-body mb-4" style={{ color: COLORS.secondary }}>产品库还是空的</p>
              <PrimaryButton onClick={() => setProductView('add')} icon={Plus}>
                添加第一个产品

        ) : (
          <Card>
            <p className="t-label mb-3 block" style={{ color: COLORS.tertiary }}>[最常用 · TOP {Math.min(topProducts.length, 8)}]</p>
            <div className="grid grid-cols-3 sm:grid-cols-4 gap-3">
              {topProducts.map(p => (
                <div key={p.id} className="flex flex-col items-center">
                  <div
                    className="w-16 h-16 rounded-xl overflow-hidden mb-2 flex items-center justify-center"
                    style={{ backgroundColor: COLORS.subtle }}

                    {productImages[p.id] ? (

function ProductAddPage({ onSave, onCancel, onImageChange }) {
  const [drafts, setDrafts] = useState([{
    id: genId(),
    brand: '',
    customBrand: '',
    name: '',
    category: 'cleanser',
    notes: '',
    imageBase64: null,
  }]);

  const updateDraft = (idx, field, value) => {
    setDrafts(prev => prev.map((d, i) => i === idx ? { ...d, [field]: value } : d));
  };

  const handleImage = async (idx, file) => {
    if (!file) return;
    try {
      const compressed = await compressImage(file);
      updateDraft(idx, 'imageBase64', compressed);
    } catch (e) {
      alert('图片处理失败');
    }
  };

  const addBlank = () => {
    setDrafts(prev => [...prev, {
      id: genId(),
      brand: '',
      customBrand: '',
      name: '',
      category: 'cleanser',
      notes: '',
      imageBase64: null,
    }]);
  };

  const removeDraft = (idx) => {
    if (drafts.length === 1) return;
    setDrafts(prev => prev.filter((_, i) => i !== idx));
  };

  const handleSave = async () => {
    const valid = drafts.filter(d => {
      const brandFinal = d.brand === '其他...' ? d.customBrand.trim() : d.brand;
      return brandFinal && d.name.trim();
    });

    if (valid.length === 0) {
      alert('请至少填一个完整的产品(品牌 + 名称必填)');
      return;
    }

    const products = [];
    for (const d of valid) {
      const brand = d.brand === '其他...' ? d.customBrand.trim() : d.brand;
      products.push({
        id: d.id,
        brand,
        name: d.name.trim(),
        category: d.category,
        notes: d.notes.trim(),
        createdAt: new Date().toISOString(),
      });
      if (d.imageBase64) {
        await onImageChange(d.id, d.imageBase64);
      }
    }
    onSave(products);
  };

  return (
    <div className="space-y-5 pb-24">
      <div className="flex items-center justify-between">
        <button
          onClick={onCancel}
          className="flex items-center gap-1 text-sm hover:opacity-70"
          style={{ color: COLORS.secondary }}
        >
          <ArrowLeft className="w-4 h-4" />
          <span className="f-song-bold-narrow">取消</span>
        </button>
        <PrimaryButton onClick={handleSave} icon={Check}>
          保存 ({drafts.length})
        </PrimaryButton>
      </div>

      <div>
        <h1 className="t-h1" style={{ color: COLORS.primary }}>添加产品</h1>
        <p className="t-body mt-2" style={{ color: COLORS.secondary }}>
          可以一次添加多个产品。每张卡片填完就行,留空的会被忽略。
        </p>
      </div>

      <div className="space-y-4">
        {drafts.map((d, idx) => (
          <Card key={d.id}>
            <div className="flex items-center justify-between mb-3">
              <span className="t-en-sm" style={{ color: COLORS.tertiary }}>
                {String(idx + 1).padStart(2, '0')}
              </span>
              {drafts.length > 1 && (
                <button
                  onClick={() => removeDraft(idx)}
                  className="text-xs hover:opacity-70"
                  style={{ color: COLORS.tertiary }}
                >
                  移除
                </button>
              )}
            </div>

            {/* Image */}
            <div className="flex items-start gap-3 mb-4">
              <label
                className="w-20 h-20 rounded-xl flex items-center justify-center overflow-hidden cursor-pointer flex-shrink-0"
                style={{ backgroundColor: COLORS.subtle }}
              >
                {d.imageBase64 ? (
                  <img src={d.imageBase64} alt="" className="w-full h-full object-cover" />
                ) : (
                  <ImageIcon className="w-6 h-6" style={{ color: COLORS.tertiary }} />
                )}
                <input
                  type="file"
                  accept="image/*"
                  className="hidden"
                  onChange={e => handleImage(idx, e.target.files?.[0])}
                />
              </label>
              <p className="text-xs flex-1 mt-1" style={{ color: COLORS.tertiary }}>
                可选 · 自动压缩到 200×200<br/>
                点击上传
              </p>
            </div>

            {/* Brand */}
            <div className="space-y-2 mb-3">
              <span className="t-label" style={{ color: COLORS.tertiary }}>[品牌 · 必填]</span>
              <select
                value={d.brand}
                onChange={e => updateDraft(idx, 'brand', e.target.value)}
                style={{ backgroundColor: COLORS.subtle, color: COLORS.primary }}
                className="w-full rounded-lg px-4 py-3 text-sm outline-none border-transparent focus:bg-white focus:ring-2 focus:ring-purple-100"
              >
                <option value="">选择品牌...</option>
                {BRAND_PRESETS.map(b => (
                  <option key={b} value={b}>{b}</option>
                ))}
              </select>
              {d.brand === '其他...' && (
                <TextInput
                  value={d.customBrand}
                  onChange={v => updateDraft(idx, 'customBrand', v)}
                  placeholder="输入品牌名"
                />
              )}
            </div>

            {/* Name */}
            <div className="space-y-2 mb-3">
              <span className="t-label" style={{ color: COLORS.tertiary }}>[产品名 · 必填]</span>
              <TextInput
                value={d.name}
                onChange={v => updateDraft(idx, 'name', v)}
                placeholder="如 Hydrating Facial Cleanser"
              />
            </div>

            {/* Category */}
            <div className="space-y-2 mb-3">
              <span className="t-label" style={{ color: COLORS.tertiary }}>[分类 · 必选]</span>
              <div className="grid grid-cols-2 sm:grid-cols-3 gap-2">
                {CATEGORIES.map(c => {
                  const Icon = c.icon;
                  const selected = d.category === c.id;
                  return (
                    <button
                      key={c.id}
                      onClick={() => updateDraft(idx, 'category', c.id)}
                      style={{
                        backgroundColor: selected ? COLORS.accentSoft : COLORS.card,
                        color: COLORS.primary,
                      }}
                      className="px-3 py-2 rounded-lg text-xs transition-all flex items-center justify-center gap-1.5"
                    >
                      <Icon className="w-3.5 h-3.5" />
                      {c.label}
                    </button>
                  );
                })}
              </div>
            </div>

            {/* Notes */}
            <div className="space-y-2">
              <span className="t-label" style={{ color: COLORS.tertiary }}>[备注 · 可选]</span>
              <TextInput
                value={d.notes}
                onChange={v => updateDraft(idx, 'notes', v)}
                placeholder="如 含烟酰胺,玫瑰痤疮慎用"
              />
            </div>
          </Card>
        ))}
      </div>

      <OutlineButton fullWidth onClick={addBlank} icon={Plus}>
        继续添加
      </OutlineButton>
    </div>
  );
}

function ProductEditForm({ product, currentImage, onSave, onCancel, onImageChange }) {
  const [draft, setDraft] = useState({
    id: product.id,
    brand: product.brand,
    customBrand: '',
    name: product.name,
    category: product.category,
    notes: product.notes || '',
    imageBase64: currentImage || null,
  });
  const isCustomBrand = !BRAND_PRESETS.includes(draft.brand) && draft.brand;

  // Initialize: if brand isn't in preset list, treat as custom
  useEffect(() => {
    if (product.brand && !BRAND_PRESETS.includes(product.brand)) {
      setDraft(d => ({ ...d, brand: '其他...', customBrand: product.brand }));
    }
  }, []);

  const handleImage = async (file) => {
    if (!file) return;
    try {
      const compressed = await compressImage(file);
      setDraft(d => ({ ...d, imageBase64: compressed }));
    } catch (e) {

  return (

function ExportTab({ allData, onImport, showToast }) {
  const fileInputRef = useRef(null);

  const exportJSON = () => {
    const json = JSON.stringify(allData, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const now = new Date();
    const stamp = `${formatDate(now)}_${String(now.getHours()).padStart(2, '0')}${String(now.getMinutes()).padStart(2, '0')}`;
    a.download = `skindiary_${stamp}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('已导出 JSON');
  };

  const handleImport = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async () => {
      try {
        const parsed = JSON.parse(reader.result);
        if (!parsed.version || !parsed.dailyRecords) {
          alert('文件格式不对,请用 app 导出的 JSON');
          return;
        }
        if (!confirm('导入会覆盖现有的所有数据(routine、产品库、所有日记录)。确认继续?')) {
          return;
        }
        await onImport(parsed);
        showToast('已导入');
      } catch (err) {
        alert('导入失败:' + err.message);
      }
      e.target.value = '';
    };
    reader.readAsText(file);
  };

  return (
    <div className="space-y-6">
      <div>
        <span className="t-label" style={{ color: COLORS.tertiary }}>[EXPORT & SAVE]</span>
        <h1 className="t-h1 mt-2" style={{ color: COLORS.primary }}>导出与保存</h1>

function WeeklyReviewFlow({ weekKey, existingRecord, dailyRecords, onComplete, onCancel }) {
  const [data, setData] = useState(() => {
    if (existingRecord) return JSON.parse(JSON.stringify(existingRecord));
    return { trend: '', mainTriggers: '', routineChange: '', toWatch: '', notes: '' };
  });
  const [dirty, setDirty] = useState(false);
  const [showConfirmExit, setShowConfirmExit] = useState(false);

  const update = (field, value) => {
    setDirty(true);
    setData(prev => ({ ...prev, [field]: value }));
  };

  const requestExit = () => {
    if (dirty) setShowConfirmExit(true);
    else onCancel();
  };

  // Compute summary stats from dailyRecords for this week
  const summaryStats = (() => {
    const weekDates = Object.keys(dailyRecords).filter(d => {
      try { return getWeekKey(parseDate(d)) === weekKey; } catch { return false; }
    });
    const recs = weekDates.map(d => dailyRecords[d]);
    const lights = recs.map(computeSkinLight).filter(l => l !== 'neutral');
    const counts = { sage: 0, honey: 0, rose: 0 };
    lights.forEach(l => { counts[l] = (counts[l] || 0) + 1; });
    let shampoo = 0;
    recs.forEach(r => { if (r.skincare?.antifungalShampooToday === true) shampoo++; });
    return { dayCount: weekDates.length, ...counts, shampoo };
  })();

  return (
    <>
      <div className="min-h-screen pb-32">
        <div className="px-5 pt-6 pb-4 flex items-center justify-between">
          <button
            onClick={requestExit}
            className="flex items-center gap-1 text-sm hover:opacity-70 transition-opacity"
            style={{ color: COLORS.secondary }}
          >
            <ArrowLeft className="w-4 h-4" />
            <span className="f-song-bold-narrow">退回</span>
          </button>
          <span className="t-label" style={{ color: COLORS.tertiary }}>[周记录]</span>

          </p>
        </div>

        {/* Summary stats card */}

              <span style={{ color: COLORS.secondary }}>好转 / 无变化</span>
              <span className="text-right" style={{ color: COLORS.primary }}>{summaryStats.sage} 天</span>
              <span style={{ color: COLORS.secondary }}>部分恶化</span>
              <span className="text-right" style={{ color: COLORS.primary }}>{summaryStats.honey} 天</span>
              <span style={{ color: COLORS.secondary }}>多数恶化</span>
              <span className="text-right" style={{ color: COLORS.primary }}>{summaryStats.rose} 天</span>
              <span style={{ color: COLORS.secondary }}>抗真菌洗发水</span>
              <span className="text-right" style={{ color: COLORS.primary }}>{summaryStats.shampoo} / 2 次</span>
            </div>

        <div className="px-5 space-y-4">
