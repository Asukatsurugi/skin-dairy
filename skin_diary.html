const storage = {
  get(key) {
    try { return localStorage.getItem(key); } catch { return null; }
  },
  set(key, value) {
    try {
      const v = typeof value === 'string' ? value : JSON.stringify(value);
      localStorage.setItem(key, v);
      return true;
    } catch (e) {
      console.error('Storage set failed:', e);
      return false;
    }
  },
  getJSON(key) {
    const v = this.get(key);
    if (!v) return null;
    try { return JSON.parse(v); } catch { return null; }
  },
  delete(key) {
    try { localStorage.removeItem(key); return true; } catch { return false; }
  },
  list(prefix) {
    const keys = [];
    try {
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith(prefix)) keys.push(k);
      }
    } catch {}
    return keys;
  }
};

function formatDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function parseDate(s) {
  const [y, m, d] = s.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function getMonthDays(year, month) {
  const first = new Date(year, month, 1);
  const last = new Date(year, month + 1, 0);
  const daysInMonth = last.getDate();
  // Monday-first: Sunday is 0 in JS, so adjust
  let firstDayOfWeek = first.getDay();
  firstDayOfWeek = firstDayOfWeek === 0 ? 6 : firstDayOfWeek - 1;

  const days = [];
  // Previous month padding
  const prevLast = new Date(year, month, 0).getDate();
  for (let i = firstDayOfWeek - 1; i >= 0; i--) {
    days.push({ day: prevLast - i, muted: true, date: null });
  }
  // Current month
  for (let i = 1; i <= daysInMonth; i++) {
    const date = new Date(year, month, i);
    days.push({
      day: i,
      muted: false,
      date: formatDate(date),
      isSunday: date.getDay() === 0,
      dateObj: date,
    });
  }
  // Next month padding
  const remaining = (7 - days.length % 7) % 7;
  for (let i = 1; i <= remaining; i++) {
    days.push({ day: i, muted: true, date: null });
  }
  return days;
}

function computeSkinLight(record) {
  if (!record || !record.skin) return 'neutral';
  const dims = ['redness', 'burning', 'itch', 'roughness'];
  let worse = 0;
  let total = 0;
  dims.forEach(d => {
    if (record.skin[d]) {
      total++;
      if (record.skin[d] === 'worse') worse++;
    }
  });
  if (record.skin.newPapules) {
    total++;
    worse++;
  }
  if (total === 0) return 'neutral';
  if (worse === 0) return 'sage';
  if (worse / total < 0.5) return 'honey';
  return 'rose';
}

async function compressImage(file, maxDim = 200, quality = 0.8) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxDim) {
          height = Math.round(height * maxDim / width);
          width = maxDim;
        } else if (height > maxDim) {
          width = Math.round(width * maxDim / height);
          height = maxDim;
        }
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

  const baseStyle = {

  const Tag = onClick ? 'button' : 'div';
  return (
    <Tag
      onClick={onClick}
      style={baseStyle}
      className={`block w-full text-left rounded-2xl border border-gray-200 shadow-sm ${padding} ${onClick ? 'transition-all duration-200 hover:shadow-md active:scale-[0.99]' : ''} ${className}`}
    >
      {children}
    </Tag>
  );
}

function MonthCalendar({ year, month, dailyRecords, weeklyRecords, onMonthChange, onDateClick }) {
  const days = getMonthDays(year, month);
  const monthName = `${year} 年 ${month + 1} 月`;

  const lightHex = (k) => COLORS[k] || COLORS.neutral;

  return (
    <Card padding="p-0">
      <div className="flex items-center justify-between px-5 py-4 border-b border-gray-200">
        <button
          onClick={() => onMonthChange(-1)}
          style={{ color: COLORS.secondary }}
          className="p-2 rounded-lg hover:bg-gray-50 active:scale-95 transition-all"
          aria-label="上个月"
        >
          <ChevronLeft className="w-5 h-5" />
        </button>
        <h2 className="t-h3" style={{ color: COLORS.primary }}>{monthName}</h2>
        <button
          onClick={() => onMonthChange(1)}
          style={{ color: COLORS.secondary }}
          className="p-2 rounded-lg hover:bg-gray-50 active:scale-95 transition-all"
          aria-label="下个月"
        >
          <ChevronRight className="w-5 h-5" />
        </button>
      </div>

      <div className="grid grid-cols-7 px-2 pt-3">
        {['一', '二', '三', '四', '五', '六', '日'].map(d => (
          <div
            key={d}
            className="text-center text-xs font-medium py-1"
            style={{ color: COLORS.tertiary }}
          >
            {d}
          </div>
        ))}
      </div>

      <div className="grid grid-cols-7 gap-0.5 px-2 pb-3">
        {days.map((d, i) => {
          if (d.muted) {
            return (
              <div key={i} className="aspect-square flex items-center justify-center opacity-30">
                <span className="text-xs" style={{ color: COLORS.tertiary }}>{d.day}</span>
              </div>
            );
          }
          const record = dailyRecords[d.date];
          const lightKey = computeSkinLight(record);
          const weekly = d.isSunday ? weeklyRecords[getWeekKey(d.dateObj)] : null;

          return (
            <button
              key={i}
              onClick={() => onDateClick(d.date)}
              className="rounded-lg flex flex-col items-center justify-start pt-1.5 pb-1 hover:bg-gray-50 transition-colors active:scale-95"
              style={{ minHeight: d.isSunday && weekly ? '80px' : '54px' }}
            >
              <span className="text-sm font-medium" style={{ color: COLORS.primary }}>
                {d.day}
              </span>
              <div
                className="rounded-full mt-1.5"
                style={{
                  width: '8px',
                  height: '8px',
                  backgroundColor: lightHex(lightKey),
                }}
              />
              {d.isSunday && weekly && (
                <div
                  className="mt-1 text-center px-0.5 leading-tight"
                  style={{ color: COLORS.secondary, fontSize: '8px' }}
                >
                  <div className="truncate">{weekly.trend || '—'}</div>
                  <div className="truncate mt-0.5">第{weekly.week || '—'}周</div>
                </div>
              )}
            </button>
          );
        })}
      </div>
    </Card>
  );
}

function getWeekKey(date) {
  const d = new Date(date);
  d.setHours(0, 0, 0, 0);
  // Find Monday of current week
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  const year = d.getFullYear();
  // ISO week number
  const jan1 = new Date(year, 0, 1);
  const week = Math.ceil(((d - jan1) / 86400000 + jan1.getDay() + 1) / 7);
  return `${year}-W${String(week).padStart(2, '0')}`;
}

function RecordingFlow({ date, existingAnswers, products, productImages, onComplete, onCancel }) {

    skin: {},
    skincare: { morning: {}, evening: {} },
    diet: {},
    environment: {},
    physical: {},
    notes: '',
  });
  const [showPreview, setShowPreview] = useState(false);

  const update = (path, value) => {
    setAnswers(prev => {
      const next = { ...prev };
      const parts = path.split('.');
      let cur = next;
      for (let i = 0; i < parts.length - 1; i++) {
        cur[parts[i]] = { ...(cur[parts[i]] || {}) };
        cur = cur[parts[i]];
      }
      cur[parts[parts.length - 1]] = value;
      return next;
    });

      {/* Progress bar */}
      <div className="sticky top-0 z-10" style={{ backgroundColor: COLORS.canvas }}>
        <div className="h-0.5" style={{ backgroundColor: '#EDEAE3' }}>
          <div
            className="h-full transition-all duration-500"
            style={{ width: `${progress}%`, backgroundColor: COLORS.accent }}
          />
        </div>
        <div className="flex items-center justify-between px-5 py-4">
          <button
            onClick={back}
            className="flex items-center gap-1 text-sm hover:opacity-70 transition-opacity"
            style={{ color: COLORS.secondary }}
          >
            <ArrowLeft className="w-4 h-4" />
            退回
          </button>
          <span className="text-xs font-mono" style={{ color: COLORS.tertiary }}>
            {step + 1} / {total}
          </span>
        </div>
      </div>

      {/* Question content */}
      <div className="flex-1 px-5 pb-32 pt-2">
        <div className="flex items-baseline gap-3 mb-2">
          <span className="t-en-sm" style={{ color: COLORS.tertiary }}>{cur.number}</span>
          <span className="t-label" style={{ color: COLORS.tertiary }}>[{cur.section}]</span>
        </div>
        <h1 className="t-h2 mb-2" style={{ color: COLORS.primary }}>{cur.title}</h1>
        {cur.sub && (
          <p className="t-body mb-6" style={{ color: COLORS.secondary }}>{cur.sub}</p>
        )}

        <ScreenContent
          screen={cur}
          answers={answers}
          update={update}
          products={products}
          productImages={productImages}
          onAutoNext={next}
        />
      </div>

      {/* Bottom action */}
      {!cur.autoNext && (
        <div
          className="fixed bottom-0 left-0 right-0 px-5 py-4 backdrop-blur-md border-t border-gray-200"
          style={{ backgroundColor: 'rgba(250, 241, 232, 0.9)' }}
        >
          <PrimaryButton fullWidth onClick={next} icon={ChevronRight}>
            {step === total - 1 ? '完成,看预览' : '下一题'}
          </PrimaryButton>
        </div>
      )}
    </div>
  );
}

// ============================================================
// SCREEN CONTENT (per question type)
// ============================================================

function ScreenContent({ screen, answers, update, products, productImages, onAutoNext }) {
  // 1) Compare type
  if (screen.kind === 'compare') {
    const opts = [
      { value: 'better', label: '好转', glyph: '↓' },
      { value: 'same', label: '无变化', glyph: '—' },
      { value: 'worse', label: '恶化', glyph: '↑' },
    ];
    return (
      <div className="space-y-3">
        {opts.map(o => (
          <OptionButton
            key={o.value}
            label={o.label}
            glyph={o.glyph}
            selected={screen.value === o.value}
            onClick={() => {
              update(screen.field, o.value);
              if (screen.autoNext) setTimeout(onAutoNext, 200);
            }}
          />
        ))}
      </div>
    );
  }

  // 2) Papules
  if (screen.kind === 'papules') {
    const has = answers.skin.newPapules;
    const areas = answers.skin.papuleAreas || [];
    const areaOpts = [
      { id: 'cheeks', label: '两颊' },
      { id: 'tzone', label: 'T 区' },
      { id: 'jaw', label: '下颌' },
      { id: 'neck', label: '颈部' },
      { id: 'other', label: '其他' },
    ];
    return (
      <div className="space-y-3">
        <OptionButton
          label="无新增"
          glyph="○"
          selected={has === false}
          onClick={() => {
            update('skin.newPapules', false);
            update('skin.papuleAreas', []);
          }}
        />
        <OptionButton
          label="有新增"
          glyph="●"
          selected={has === true}
          onClick={() => update('skin.newPapules', true)}
        />
        {has === true && (
          <div className="pt-2 space-y-2 fade-in">
            <span className="t-label" style={{ color: COLORS.tertiary }}>[主要区域 · 可多选]</span>
            <div className="flex flex-wrap gap-2 pt-2">
              {areaOpts.map(a => {
                const selected = areas.includes(a.id);
                return (
                  <button
                    key={a.id}
                    onClick={() => {
                      const next = selected ? areas.filter(x => x !== a.id) : [...areas, a.id];
                      update('skin.papuleAreas', next);
                    }}
                    style={{
                      backgroundColor: selected ? COLORS.accentSoft : COLORS.card,
                      borderColor: selected ? COLORS.accent : '#e5e7eb',
                      color: COLORS.primary,
                    }}
                    className="px-4 py-2 rounded-full text-sm border shadow-sm transition-all hover:shadow-md"
                  >
                    {a.label}
                  </button>
                );
              })}
            </div>
          </div>
        )}
      </div>
    );
  }

  // 3) Photos
  if (screen.kind === 'photos') {
    const photos = answers.skin.photos || [];
    const updatePhoto = (i, val) => {
      const next = [...photos];
      next[i] = val;
      update('skin.photos', next.filter(x => x && x.trim()));
    };
    return (
      <div className="space-y-3">
        {[0, 1, 2].map(i => (
          <TextInput
            key={i}
            value={photos[i] || ''}
            onChange={v => updatePhoto(i, v)}
            placeholder={`照片 ${i + 1} 文件名(可留空)`}
          />
        ))}
        <p className="t-caption" style={{ color: COLORS.tertiary }}>
          填类似 IMG_3893.jpeg 这种文件名,方便日后回看时去相册找。
        </p>
      </div>
    );
  }

  // 4) Skincare morning/evening
  if (screen.kind === 'skincare-morning' || screen.kind === 'skincare-evening') {
    const isM = screen.kind === 'skincare-morning';
    const slot = isM ? 'morning' : 'evening';
    const cur = answers.skincare[slot] || {};
    const updateSlot = (key, val) => update(`skincare.${slot}.${key}`, val);

    const items = isM
      ? [
          { key: 'finacea', type: 'bool', label: 'Finacea' },
          { key: 'cleanserId', type: 'product', label: '洗面奶', cat: 'cleanser' },
          { key: 'moisturizerId', type: 'product', label: '保湿', cat: 'moisturizer' },
          { key: 'sunscreenId', type: 'product', label: '防晒', cat: 'sunscreen' },
        ]
      : [
          { key: 'finacea', type: 'bool', label: 'Finacea' },
          { key: 'cleanserId', type: 'product', label: '洗面奶', cat: 'cleanser' },
          { key: 'moisturizerId', type: 'product', label: '保湿', cat: 'moisturizer' },
        ];

    return (
      <div className="space-y-3">
        {items.map(item => (
          <SkincareRow
            key={item.key}
            item={item}
            value={cur[item.key]}
            onChange={v => updateSlot(item.key, v)}
            products={products}
            productImages={productImages}
          />
        ))}
      </div>
    );
  }

  // 5) Shampoo
  if (screen.kind === 'shampoo') {
    const opts = [
      { v: 0, label: '今天没用' },
      { v: 1, label: '本周第 1 次' },
      { v: 2, label: '本周第 2 次' },
      { v: 3, label: '本周第 3 次或更多' },
    ];
    return (
      <div className="space-y-3">
        {opts.map(o => (
          <OptionButton
            key={o.v}
            label={o.label}
            glyph={o.v === 0 ? '○' : `${o.v}`}
            selected={answers.skincare.antifungalShampooThisWeek === o.v}
            onClick={() => {
              update('skincare.antifungalShampooThisWeek', o.v);
              setTimeout(onAutoNext, 200);
            }}
          />
        ))}
      </div>
    );
  }

  // 6) Diet-1: alcohol/spicy/caffeine/highHistamine/otherSuspect
  if (screen.kind === 'diet-1') {
    const fields = [
      { key: 'alcohol', label: '酒精', icon: Wine, placeholder: '红酒一杯/啤酒一瓶等' },
      { key: 'spicy', label: '辣食', icon: Flame, placeholder: '川菜/咖喱等' },
      { key: 'caffeine', label: '咖啡因', icon: Coffee, placeholder: '咖啡 200ml/抹茶 1 杯等' },
      { key: 'highHistamine', label: '高组胺食物', icon: AlertCircle, placeholder: '陈奶酪/发酵/番茄等' },
      { key: 'otherSuspect', label: '其他怀疑食物', icon: AlertCircle, placeholder: '描述...' },
    ];
    return (
      <div className="space-y-3">
        {fields.map(f => (
          <DietRow
            key={f.key}
            field={f}
            value={answers.diet[f.key]}
            onChange={v => update(`diet.${f.key}`, v)}
          />
        ))}
      </div>
    );
  }

  // 7) Hot drinks
  if (screen.kind === 'hotdrinks') {
    const hd = answers.diet.hotDrinks || { cups: 0, temp: 'warm' };
    const cupsOpts = [
      { v: 0, label: '没喝' },
      { v: 1, label: '1 杯' },
      { v: 2, label: '2 杯' },
      { v: 3, label: '3 杯或更多' },
    ];
    const tempOpts = [
      { v: 'warm', label: '温(不烫嘴)' },
      { v: 'hot', label: '热(微烫)' },
      { v: 'veryhot', label: '很烫' },
    ];
    return (
      <div className="space-y-5">
        <div>
          <span className="t-label mb-3 block" style={{ color: COLORS.tertiary }}>[杯数]</span>
          <div className="space-y-2">
            {cupsOpts.map(o => (
              <OptionButton
                key={o.v}
                label={o.label}
                selected={hd.cups === o.v}
                onClick={() => update('diet.hotDrinks', { ...hd, cups: o.v })}
              />
            ))}
          </div>
        </div>
        {hd.cups > 0 && (
          <div className="fade-in">
            <span className="t-label mb-3 block" style={{ color: COLORS.tertiary }}>[温度]</span>
            <div className="space-y-2">
              {tempOpts.map(o => (
                <OptionButton
                  key={o.v}
                  label={o.label}
                  selected={hd.temp === o.v}
                  onClick={() => update('diet.hotDrinks', { ...hd, temp: o.v })}
                />
              ))}
            </div>
          </div>
        )}
      </div>
    );
  }

  // 8) Supplements
  if (screen.kind === 'supplements') {
    const ids = answers.diet.supplementIds || [];
    const supplements = products.filter(p => p.category === 'supplement');
    return (
      <div className="space-y-3">
        {supplements.length === 0 && (
          <Card emphasis>
            <p className="t-body" style={{ color: COLORS.secondary }}>
              你的产品库里还没有营养补剂。先跳过此题,可以在「护理方案」标签页里添加。
            </p>
          </Card>
        )}
        {supplements.map(s => {
          const selected = ids.includes(s.id);
          return (
            <button
              key={s.id}
              onClick={() => {
                const next = selected ? ids.filter(x => x !== s.id) : [...ids, s.id];
                update('diet.supplementIds', next);
              }}
              style={{
                backgroundColor: selected ? COLORS.accentSoft : COLORS.card,
                borderColor: selected ? COLORS.accent : '#e5e7eb',
              }}
              className="w-full rounded-xl p-4 text-left flex items-center gap-3 border shadow-sm transition-all hover:shadow-md"
            >
              <div
                className="w-10 h-10 rounded-lg flex items-center justify-center overflow-hidden border border-gray-200"
                style={{ backgroundColor: COLORS.subtle }}
              >
                {productImages[s.id] ? (
                  <img src={productImages[s.id]} alt="" className="w-full h-full object-cover" />
                ) : (
                  <Sparkles className="w-4 h-4" style={{ color: COLORS.tertiary }} />
                )}
              </div>
              <div className="flex-1">
                <div className="text-sm font-medium" style={{ color: COLORS.primary }}>{s.brand}</div>
                <div className="text-xs" style={{ color: COLORS.secondary }}>{s.name}</div>
              </div>
              {selected && <Check className="w-5 h-5" style={{ color: COLORS.accent }} />}
            </button>
          );
        })}
      </div>
    );
  }

  // 9) Outdoor temp
  if (screen.kind === 'outdoor-temp') {
    return (
      <div className="space-y-3">
        <div className="flex items-center gap-3">
          <input
            type="number"
            value={answers.environment.outdoorTempC ?? ''}
            onChange={e => {
              const v = e.target.value === '' ? null : Number(e.target.value);
              update('environment.outdoorTempC', v);
            }}
            placeholder="温度"
            style={{ backgroundColor: COLORS.subtle, color: COLORS.primary }}
            className="flex-1 rounded-lg px-4 py-3 text-base outline-none border border-transparent focus:bg-white focus:border-gray-200 focus:ring-2 focus:ring-purple-100"
          />
          <span className="t-h3" style={{ color: COLORS.tertiary }}>℃</span>
        </div>
      </div>
    );
  }

  // 10) Environment checkboxes
  if (screen.kind === 'environment') {
    const env = answers.environment;
    const items = [
      { key: 'indoorHVAC', label: '室内开了暖气或空调' },
      { key: 'tempSwing', label: '经历明显冷热温差(>10℃ 切换)' },
      { key: 'wind', label: '有大风' },
      { key: 'dryEnv', label: '环境干燥' },
    ];
    return (
      <div className="space-y-3">
        {items.map(item => {
          const checked = !!env[item.key];
          return (
            <button
              key={item.key}
              onClick={() => update(`environment.${item.key}`, !checked)}
              style={{
                backgroundColor: checked ? COLORS.accentSoft : COLORS.card,
                borderColor: checked ? COLORS.accent : '#e5e7eb',
              }}
              className="w-full rounded-xl p-4 text-left flex items-center gap-3 border shadow-sm transition-all hover:shadow-md"
            >
              <div
                className="w-5 h-5 rounded border flex items-center justify-center flex-shrink-0"
                style={{
                  backgroundColor: checked ? COLORS.accent : 'transparent',
                  borderColor: checked ? COLORS.accent : COLORS.tertiary,
                }}
              >
                {checked && <Check className="w-3 h-3 text-white" strokeWidth={3} />}
              </div>
              <span className="text-sm" style={{ color: COLORS.primary }}>{item.label}</span>
            </button>
          );
        })}
        {/* Sun direct exposure */}
        <div className="pt-3 space-y-2">
          <span className="t-label" style={{ color: COLORS.tertiary }}>[阳光直射 · 分钟]</span>
          <div className="flex items-center gap-3">
            <input
              type="number"
              value={env.sunDirectMin ?? ''}
              onChange={e => {
                const v = e.target.value === '' ? 0 : Number(e.target.value);
                update('environment.sunDirectMin', v);
              }}
              placeholder="0"
              style={{ backgroundColor: COLORS.subtle, color: COLORS.primary }}
              className="flex-1 rounded-lg px-4 py-3 text-sm outline-none border border-transparent focus:bg-white focus:border-gray-200 focus:ring-2 focus:ring-purple-100"
            />
            <span className="text-sm" style={{ color: COLORS.tertiary }}>分钟</span>
          </div>
          {env.sunDirectMin > 0 && (
            <div className="flex gap-2 pt-1 fade-in">
              {[
                { v: true, label: '有防晒' },
                { v: false, label: '无防晒' },
              ].map(o => (
                <button
                  key={String(o.v)}
                  onClick={() => update('environment.sunWithSPF', o.v)}
                  style={{
                    backgroundColor: env.sunWithSPF === o.v ? COLORS.accentSoft : COLORS.card,
                    borderColor: env.sunWithSPF === o.v ? COLORS.accent : '#e5e7eb',
                    color: COLORS.primary,
                  }}
                  className="flex-1 px-4 py-2 rounded-full text-sm border shadow-sm transition-all"
                >
                  {o.label}
                </button>
              ))}
            </div>
          )}
        </div>
      </div>
    );
  }

  // 11) Sweating
  if (screen.kind === 'sweating') {
    const opts = [
      { v: 'none', label: '没出汗' },
      { v: 'light', label: '轻微出汗' },
      { v: 'medium', label: '中等出汗' },
      { v: 'heavy', label: '大量出汗' },
    ];
    return (
      <div className="space-y-3">
        {opts.map(o => (
          <OptionButton
            key={o.v}
            label={o.label}
            selected={answers.physical.sweating === o.v}
            onClick={() => {
              update('physical.sweating', o.v);
              setTimeout(onAutoNext, 200);
            }}
          />
        ))}
      </div>
    );
  }

  // 12) Hot water
  if (screen.kind === 'hotwater') {
    const items = [
      { key: 'hotShower', label: '洗了热水澡' },
      { key: 'hotFaceWash', label: '用热水洗了脸' },
    ];
    return (
      <div className="space-y-3">
        {items.map(item => {
          const checked = !!answers.physical[item.key];
          return (
            <button
              key={item.key}
              onClick={() => update(`physical.${item.key}`, !checked)}
              style={{
                backgroundColor: checked ? COLORS.accentSoft : COLORS.card,
                borderColor: checked ? COLORS.accent : '#e5e7eb',
              }}
              className="w-full rounded-xl p-4 text-left flex items-center gap-3 border shadow-sm transition-all hover:shadow-md"
            >
              <div
                className="w-5 h-5 rounded border flex items-center justify-center flex-shrink-0"
                style={{
                  backgroundColor: checked ? COLORS.accent : 'transparent',
                  borderColor: checked ? COLORS.accent : COLORS.tertiary,
                }}
              >
                {checked && <Check className="w-3 h-3 text-white" strokeWidth={3} />}
              </div>
              <span className="text-sm" style={{ color: COLORS.primary }}>{item.label}</span>
            </button>
          );
        })}
      </div>
    );
  }

  // 13) Exercise
  if (screen.kind === 'exercise') {
    const ex = answers.physical.exercise || { had: false, type: '', intensity: '' };
    return (
      <div className="space-y-3">
        <OptionButton
          label="没运动"
          glyph="○"
          selected={ex.had === false}
          onClick={() => update('physical.exercise', { had: false, type: '', intensity: '' })}
        />
        <OptionButton
          label="有运动"
          glyph="●"
          selected={ex.had === true}
          onClick={() => update('physical.exercise', { ...ex, had: true })}
        />
        {ex.had && (
          <div className="pt-2 space-y-3 fade-in">
            <div>
              <span className="t-label mb-2 block" style={{ color: COLORS.tertiary }}>[类型]</span>
              <TextInput
                value={ex.type}
                onChange={v => update('physical.exercise', { ...ex, type: v })}
                placeholder="跑步/瑜伽/力量训练等"
              />
            </div>
            <div>
              <span className="t-label mb-2 block" style={{ color: COLORS.tertiary }}>[强度]</span>
              <div className="flex gap-2">
                {[
                  { v: 'low', label: '低' },
                  { v: 'mid', label: '中' },
                  { v: 'high', label: '高' },
                ].map(o => (
                  <button
                    key={o.v}
                    onClick={() => update('physical.exercise', { ...ex, intensity: o.v })}
                    style={{
                      backgroundColor: ex.intensity === o.v ? COLORS.accentSoft : COLORS.card,
                      borderColor: ex.intensity === o.v ? COLORS.accent : '#e5e7eb',
                      color: COLORS.primary,
                    }}
                    className="flex-1 px-4 py-2 rounded-full text-sm border shadow-sm transition-all"
                  >
                    {o.label}
                  </button>
                ))}
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  // 14) Bedtime
  if (screen.kind === 'bedtime') {
    return (
      <div>
        <input
          type="time"
          value={answers.physical.bedtime || ''}
          onChange={e => update('physical.bedtime', e.target.value)}
          style={{ backgroundColor: COLORS.subtle, color: COLORS.primary }}
          className="w-full rounded-lg px-4 py-3 text-base outline-none border border-transparent focus:bg-white focus:border-gray-200 focus:ring-2 focus:ring-purple-100"
        />
        <p className="t-caption mt-3" style={{ color: COLORS.tertiary }}>
          长期睡眠不足会影响皮肤屏障修复。
        </p>
      </div>
    );
  }

  // 15) Stress
  if (screen.kind === 'stress') {
    const s = answers.physical.stress || { had: false, detail: '' };
    return (
      <div className="space-y-3">
        <OptionButton
          label="还行"
          glyph="○"
          selected={s.had === false}
          onClick={() => update('physical.stress', { had: false, detail: '' })}
        />
        <OptionButton
          label="压力较大"
          glyph="●"
          selected={s.had === true}
          onClick={() => update('physical.stress', { ...s, had: true })}
        />
        {s.had && (
          <div className="pt-2 fade-in">
            <TextArea
              value={s.detail}
              onChange={v => update('physical.stress', { ...s, detail: v })}
              placeholder="什么事情(可留空)"
              rows={3}
            />
          </div>
        )}
      </div>
    );
  }

  // 16) Period
  if (screen.kind === 'period') {
    const p = answers.physical.period || { active: false, dayN: null };
    return (
      <div className="space-y-3">
        <OptionButton
          label="不在月经期"
          glyph="○"
          selected={p.active === false}
          onClick={() => update('physical.period', { active: false, dayN: null })}
        />
        <OptionButton
          label="月经期中"
          glyph="●"
          selected={p.active === true}
          onClick={() => update('physical.period', { ...p, active: true })}
        />
        {p.active && (
          <div className="pt-2 fade-in">
            <span className="t-label mb-2 block" style={{ color: COLORS.tertiary }}>[本次月经第几天]</span>
            <div className="flex items-center gap-3">
              <input
                type="number"
                min="1"
                max="14"
                value={p.dayN ?? ''}
                onChange={e => {
                  const v = e.target.value === '' ? null : Number(e.target.value);
                  update('physical.period', { ...p, dayN: v });
                }}
                placeholder="1"
                style={{ backgroundColor: COLORS.subtle, color: COLORS.primary }}
                className="flex-1 rounded-lg px-4 py-3 text-base outline-none border border-transparent focus:bg-white focus:border-gray-200 focus:ring-2 focus:ring-purple-100"
              />
              <span className="text-sm" style={{ color: COLORS.tertiary }}>第几天</span>
            </div>
          </div>
        )}
      </div>
    );
  }

  // 17) New textile
  if (screen.kind === 'textile') {
    const v = answers.physical.newTextile;
    return (
      <div className="space-y-3">
        <OptionButton
          label="没有"
          glyph="○"
          selected={v === false}
          onClick={() => {
            update('physical.newTextile', false);
            setTimeout(onAutoNext, 200);
          }}
        />
        <OptionButton
          label="接触了"
          glyph="●"
          selected={v === true}
          onClick={() => {
            update('physical.newTextile', true);
            setTimeout(onAutoNext, 200);
          }}
        />
      </div>
    );
  }

  // 18) Notes
  if (screen.kind === 'notes') {
    return (
      <TextArea
        value={answers.notes || ''}
        onChange={v => update('notes', v)}
        placeholder="今日特殊情况、跟昨天比较、其他观察..."
        rows={6}
      />
    );
  }

  return null;
}

function CareTab({ routine, onSaveRoutine, products, productImages, onProductsChange, onProductImageChange, useCount }) {
  const [routineEditing, setRoutineEditing] = useState(false);
  const [routineDraft, setRoutineDraft] = useState(routine);
  const [productView, setProductView] = useState('main'); // main | edit | add
  const [editingProduct, setEditingProduct] = useState(null);

  const renderRoutineMD = (md) => {
    // Simple markdown rendering for **bold** and lists
    return md.split('\n').map((line, i) => {
      const renderInline = (text) => {
        const parts = text.split(/(\*\*[^*]+\*\*)/g);
        return parts.map((p, j) => {
          if (p.startsWith('**') && p.endsWith('**')) {
            return <strong key={j} style={{ color: COLORS.primary, fontWeight: 700 }}>{p.slice(2, -2)}</strong>;
          }
          return <span key={j}>{p}</span>;
        });
      };
      if (line.match(/^\d+\./)) {
        return <li key={i} className="ml-4 mt-1">{renderInline(line.replace(/^\d+\.\s*/, ''))}</li>;
      }
      if (line.trim() === '') return <br key={i} />;
      return <div key={i} className="mt-2">{renderInline(line)}</div>;
    });
  };

  const topProducts = [...products]
    .map(p => ({ ...p, count: useCount[p.id] || 0 }))
    .sort((a, b) => b.count - a.count)
    .slice(0, 8);

  if (productView === 'add' || (productView === 'edit' && editingProduct === 'new')) {
    return <ProductAddPage
      onSave={async (newProducts) => {
        const updated = [...products, ...newProducts];
        await onProductsChange(updated);
        setProductView('edit');
      }}
      onCancel={() => setProductView('edit')}
      onImageChange={onProductImageChange}
    />;
  }

  if (productView === 'edit') {
    return <ProductEditPage
      products={products}
      productImages={productImages}
      onDelete={async (id) => {
        await onProductsChange(products.filter(p => p.id !== id));
      }}
      onAddNew={() => setProductView('add')}
      onBack={() => setProductView('main')}
    />;
  }

  if (routineEditing) {
    return (
      <div className="space-y-4">
        <div className="flex items-center justify-between">
          <button
            onClick={() => { setRoutineDraft(routine); setRoutineEditing(false); }}
            className="flex items-center gap-1 text-sm hover:opacity-70"
            style={{ color: COLORS.secondary }}
          >
            <ArrowLeft className="w-4 h-4" />
            取消
          </button>
          <PrimaryButton onClick={() => { onSaveRoutine(routineDraft); setRoutineEditing(false); }} icon={Check}>
            保存
          </PrimaryButton>
        </div>
        <h1 className="t-h2" style={{ color: COLORS.primary }}>编辑 routine</h1>
        <p className="t-caption" style={{ color: COLORS.tertiary }}>
          支持 Markdown:**粗体**、emoji、有序列表
        </p>
        <textarea
          value={routineDraft}
          onChange={e => setRoutineDraft(e.target.value)}
          rows={20}
          style={{
            backgroundColor: COLORS.subtle,
            color: COLORS.primary,
            fontFamily: '"ChillHuoSong_F", monospace',
          }}
          className="w-full rounded-xl px-4 py-3 text-sm outline-none border border-gray-200 shadow-sm focus:bg-white focus:ring-2 focus:ring-purple-100 resize-none"
        />
      </div>
    );
  }

  return (
    <div className="space-y-6">
      <div>
        <span className="t-label" style={{ color: COLORS.tertiary }}>[CARE PLAN]</span>
        <h1 className="t-h1 mt-2" style={{ color: COLORS.primary }}>护理方案</h1>

        <Card emphasis>

    name: '',

    notes: '',
    imageBase64: null,
  }]);

  const updateDraft = (idx, field, value) => {
    setDrafts(prev => prev.map((d, i) => i === idx ? { ...d, [field]: value } : d));
  };

  const handleImage = async (idx, file) => {
    if (!file) return;
    try {
      const compressed = await compressImage(file);
      updateDraft(idx, 'imageBase64', compressed);
    } catch (e) {
      alert('图片处理失败');
    }
  };

  const addBlank = () => {
    setDrafts(prev => [...prev, {
      id: genId(),
      brand: '',
      customBrand: '',
      name: '',
      category: 'cleanser',
      notes: '',
      imageBase64: null,
    }]);
  };

  const removeDraft = (idx) => {
    if (drafts.length === 1) return;
    setDrafts(prev => prev.filter((_, i) => i !== idx));

  const handleSave = async () => {
    const valid = drafts.filter(d => {
      const brandFinal = d.brand === '其他...' ? d.customBrand.trim() : d.brand;

function ExportTab({ allData, onImport, showToast }) {
  const fileInputRef = useRef(null);

  const exportJSON = () => {
    const json = JSON.stringify(allData, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const now = new Date();
    const stamp = `${formatDate(now)}_${String(now.getHours()).padStart(2, '0')}${String(now.getMinutes()).padStart(2, '0')}`;
    a.download = `skindiary_${stamp}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('已导出 JSON');
  };

  const handleImport = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async () => {
      try {
        const parsed = JSON.parse(reader.result);
        if (!parsed.version || !parsed.dailyRecords) {
          alert('文件格式不对,请用 app 导出的 JSON');
          return;
        }
        if (!confirm('导入会覆盖现有的所有数据(routine、产品库、所有日记录)。确认继续?')) {
          return;
        }
        await onImport(parsed);
        showToast('已导入');
      } catch (err) {
        alert('导入失败:' + err.message);
      }
      e.target.value = '';
    };
    reader.readAsText(file);
  };

  return (
    <div className="space-y-6">
      <div>
        <span className="t-label" style={{ color: COLORS.tertiary }}>[EXPORT & SAVE]</span>
        <h1 className="t-h1 mt-2" style={{ color: COLORS.primary }}>导出与保存</h1>
      </div>

      {/* JSON Export */}
      <div>
        <div className="flex items-baseline gap-3 mb-3">
          <span className="t-en-sm" style={{ color: COLORS.tertiary }}>01</span>
          <h2 className="t-h2" style={{ color: COLORS.primary }}>JSON 导出</h2>
        </div>
        <Card>
          <p className="t-body mb-4" style={{ color: COLORS.secondary }}>
            完整备份当前所有数据(routine + 产品库 + 所有日记录 + 产品图片)。可以重新导入恢复,也可以直接发给 AI 分析。
          </p>
          <div className="flex flex-wrap gap-3">
            <PrimaryButton onClick={exportJSON} icon={Download}>导出 JSON</PrimaryButton>
            <OutlineButton onClick={() => fileInputRef.current?.click()} icon={Upload}>
              导入 JSON
            </OutlineButton>
            <input
              ref={fileInputRef}
              type="file"
              accept=".json,application/json"
              className="hidden"
              onChange={handleImport}
            />
          </div>
        </Card>
      </div>

      {/* Markdown Export (Phase 2) */}
      <div>
        <div className="flex items-baseline gap-3 mb-3">
          <span className="t-en-sm" style={{ color: COLORS.tertiary }}>02</span>
          <h2 className="t-h2" style={{ color: COLORS.primary }}>Markdown 导出</h2>
          <span className="t-label" style={{ color: COLORS.accent }}>[PHASE 2]</span>
        </div>
        <Card>
          <p className="t-body mb-4" style={{ color: COLORS.secondary }}>
            生成阅读友好的 Markdown 文件。给医生看、自己回顾、给 AI 分析都更舒服。
          </p>
          <OutlineButton
            onClick={() => showToast('Phase 2 即将上线')}
            icon={FileText}
            disabled={false}
          >
            导出 Markdown
          </OutlineButton>
        </Card>
      </div>

      {/* Stats */}
      <div>
        <div className="flex items-baseline gap-3 mb-3">
          <span className="t-en-sm" style={{ color: COLORS.tertiary }}>03</span>
          <h2 className="t-h2" style={{ color: COLORS.primary }}>当前数据</h2>

        <div className="grid grid-cols-2 gap-3">

function App() {
  const [tab, setTab] = useState('calendar');
  const [calendarYear, setCalendarYear] = useState(new Date().getFullYear());
  const [calendarMonth, setCalendarMonth] = useState(new Date().getMonth());
  const [view, setView] = useState({ name: 'main' });
  const [loaded, setLoaded] = useState(false);

  const [routine, setRoutine] = useState(DEFAULT_ROUTINE);
  const [products, setProducts] = useState([]);
  const [productImages, setProductImages] = useState({});
  const [dailyRecords, setDailyRecords] = useState({});
  const [weeklyRecords, setWeeklyRecords] = useState({});
  const [toast, setToast] = useState({ show: false, message: '' });

  const showToast = (message) => {
    setToast({ show: true, message });
    setTimeout(() => setToast({ show: false, message: '' }), 2000);
  };

  // Load data on mount
  useEffect(() => {
    (async () => {
      const r = await storage.get('routine');
      if (r) setRoutine(r);

      const ps = await storage.getJSON('products');
      if (ps) setProducts(ps);

      // Load product images
      if (ps && ps.length > 0) {
        const imgs = {};
        for (const p of ps) {
          const img = await storage.get(`product_image:${p.id}`);
          if (img) imgs[p.id] = img;
        }
        setProductImages(imgs);
      }

      // Load daily records
      const dailyKeys = await storage.list('daily:');
      const records = {};
      for (const k of dailyKeys) {
        const date = k.replace('daily:', '');
        const data = await storage.getJSON(k);
        if (data) records[date] = data;
      }
      setDailyRecords(records);

      // Load weekly records
      const weeklyKeys = await storage.list('weekly:');
      const weekly = {};
      for (const k of weeklyKeys) {
        const wk = k.replace('weekly:', '');
        const data = await storage.getJSON(k);
        if (data) weekly[wk] = data;
      }
      setWeeklyRecords(weekly);

      setLoaded(true);
    })();
  }, []);

  // Compute use count
  const useCount = (() => {
    const counts = {};
    Object.values(dailyRecords).forEach(r => {
      const used = new Set();
      ['cleanserId', 'moisturizerId', 'sunscreenId'].forEach(k => {
        if (r.skincare?.morning?.[k]) used.add(r.skincare.morning[k]);
        if (r.skincare?.evening?.[k]) used.add(r.skincare.evening[k]);
      });
      (r.diet?.supplementIds || []).forEach(id => used.add(id));
      used.forEach(id => { counts[id] = (counts[id] || 0) + 1; });
    });
    return counts;
  })();

  // Save routine
  const saveRoutine = async (md) => {
    setRoutine(md);
    await storage.set('routine', md);
    showToast('已保存 routine');
  };

  // Save products
  const saveProducts = async (newProducts) => {
    setProducts(newProducts);
    await storage.set('products', newProducts);
  };

  // Save product image
  const saveProductImage = async (id, base64) => {
    setProductImages(prev => ({ ...prev, [id]: base64 }));
    await storage.set(`product_image:${id}`, base64);
  };

  // Save daily record
  const saveDailyRecord = async (date, record) => {
    setDailyRecords(prev => ({ ...prev, [date]: record }));
    await storage.set(`daily:${date}`, record);
    showToast('已保存今日记录');
  };

  // Import all
  const importAll = async (data) => {
    if (data.routine?.rawMarkdown) {
      setRoutine(data.routine.rawMarkdown);
      await storage.set('routine', data.routine.rawMarkdown);
    }
    const newProducts = data.products || [];
    const noImageProducts = newProducts.map(p => {
      const { imageBase64, ...rest } = p;
      return rest;
    });
    setProducts(noImageProducts);
    await storage.set('products', noImageProducts);

    const newImages = {};
    for (const p of newProducts) {
      if (p.imageBase64) {
        newImages[p.id] = p.imageBase64;
        await storage.set(`product_image:${p.id}`, p.imageBase64);
      }
    }
    setProductImages(newImages);

    const newDaily = data.dailyRecords || {};
    setDailyRecords(newDaily);
    for (const [date, record] of Object.entries(newDaily)) {
      await storage.set(`daily:${date}`, record);
    }

    const newWeekly = data.weeklyRecords || {};
    setWeeklyRecords(newWeekly);
    for (const [wk, record] of Object.entries(newWeekly)) {
      await storage.set(`weekly:${wk}`, record);
    }
  };

  const allData = {
    version: '1.0',
    exportedAt: new Date().toISOString(),
    settings: { language: 'zh-CN' },
    routine: { rawMarkdown: routine },
    products: products.map(p => ({
      ...p,
      imageBase64: productImages[p.id] || null,
    })),
    dailyRecords,
    weeklyRecords,
  };

  // Month navigation
  const changeMonth = (delta) => {
    let m = calendarMonth + delta;
    let y = calendarYear;
    if (m < 0) { m = 11; y--; }
    if (m > 11) { m = 0; y++; }
    setCalendarYear(y);
    setCalendarMonth(m);
  };

  const handleDateClick = (date) => {
    setView({ name: 'day-detail', date });
  };

  const startRecording = (date) => {
    const existing = dailyRecords[date];
    setView({ name: 'recording', date, existingAnswers: existing });
  };

  const handleRecordingComplete = async (answers) => {
    await saveDailyRecord(view.date, answers);
    setView({ name: 'main' });
    setTab('calendar');
  };

  const todayDate = formatDate(new Date());

  // Determine if we're on weekly review day (Sunday)
  const today = new Date();
  const isSunday = today.getDay() === 0;

  // ============== RENDER ==============

  if (!loaded) {
    return (
      <div
        className="min-h-screen flex items-center justify-center"
        style={{ backgroundColor: COLORS.canvas, color: COLORS.tertiary }}
      >
        <style>{STYLE_BLOCK}</style>
        <p className="t-body">载入中...</p>
      </div>
    );
  }

  // Recording flow takes over the whole screen
  if (view.name === 'recording') {
    return (
      <div
        style={{
          backgroundColor: COLORS.canvas,
          color: COLORS.primary,
          minHeight: '100vh',
        }}
      >
        <style>{STYLE_BLOCK}</style>
        <RecordingFlow
          date={view.date}
          existingAnswers={view.existingAnswers}
          products={products}
          productImages={productImages}
          onComplete={handleRecordingComplete}
          onCancel={() => setView({ name: 'main' })}
        />
        <Toast message={toast.message} show={toast.show} />
      </div>
    );
  }

  return (
    <div
      style={{
        backgroundColor: COLORS.canvas,
        color: COLORS.primary,
        minHeight: '100vh',
      }}
      className="pb-24"
    >
      <style>{STYLE_BLOCK}</style>

      <div className="max-w-2xl mx-auto px-5 pt-8">
        {/* Calendar Tab */}
        {tab === 'calendar' && view.name === 'main' && (
          <div className="space-y-5">
            <div>
              <span className="t-label" style={{ color: COLORS.tertiary }}>[CALENDAR · {todayDate.replace(/-/g, ' / ')}]</span>
              <h1 className="t-h1 mt-2" style={{ color: COLORS.primary }}>日历概览</h1>
            </div>

            <MonthCalendar
              year={calendarYear}
              month={calendarMonth}
              dailyRecords={dailyRecords}
              weeklyRecords={weeklyRecords}
              onMonthChange={changeMonth}
              onDateClick={handleDateClick}
            />

            <div className="space-y-3">
              <PrimaryButton fullWidth onClick={() => startRecording(todayDate)} icon={Pencil}>
                {dailyRecords[todayDate] ? '修改今日记录' : '记录今日'}
              </PrimaryButton>
              <OutlineButton
                fullWidth
                onClick={() => showToast('Phase 2 即将上线')}
                icon={FileText}
                disabled={!isSunday}
              >
                记录本周 {!isSunday && '· 周日开放'} <span className="t-label ml-1" style={{ color: COLORS.accent }}>[PHASE 2]</span>
              </OutlineButton>
            </div>

            {/* Light legend */}
            <Card>
              <p className="t-label mb-3 block" style={{ color: COLORS.tertiary }}>[图例]</p>
              <div className="flex flex-wrap gap-x-4 gap-y-2">
                {[
                  { c: 'sage', l: '全好转 / 无变化' },
                  { c: 'honey', l: '部分恶化' },
                  { c: 'rose', l: '多数恶化' },
                  { c: 'neutral', l: '无记录' },
                ].map(it => (
                  <div key={it.c} className="flex items-center gap-2">
                    <div
                      style={{ width: '8px', height: '8px', backgroundColor: COLORS[it.c] }}
                      className="rounded-full"
                    />
                    <span className="text-xs" style={{ color: COLORS.secondary }}>{it.l}</span>
                  </div>
                ))}
              </div>
            </Card>
          </div>
        )}

        {tab === 'calendar' && view.name === 'day-detail' && (
          <DayDetail
            date={view.date}
            record={dailyRecords[view.date]}
            products={products}
            productImages={productImages}
            onBack={() => setView({ name: 'main' })}
            onEdit={() => startRecording(view.date)}
          />
        )}

        {/* Care Tab */}
        {tab === 'care' && (
          <CareTab
            routine={routine}
            onSaveRoutine={saveRoutine}
            products={products}
            productImages={productImages}
            onProductsChange={saveProducts}
            onProductImageChange={saveProductImage}
            useCount={useCount}
          />
        )}

        {/* Export Tab */}
        {tab === 'export' && (
          <ExportTab
            allData={allData}
            onImport={importAll}
            showToast={showToast}
          />
        )}
      </div>

      {/* Bottom Tab Bar */}
      <div
        className="fixed bottom-0 left-0 right-0 backdrop-blur-md border-t border-gray-200"
        style={{
          backgroundColor: 'rgba(250, 241, 232, 0.9)',
          height: '64px',
        }}
      >
        <div className="flex h-full max-w-2xl mx-auto">
          {[
            { id: 'calendar', label: '日历概览', icon: CalendarIcon },
            { id: 'care', label: '护理方案', icon: FlaskConical },
            { id: 'export', label: '导出与保存', icon: Save },
          ].map(t => {
            const Icon = t.icon;
            const isActive = tab === t.id;
            return (
              <button
                key={t.id}
                onClick={() => { setTab(t.id); setView({ name: 'main' }); }}
                className="flex-1 relative flex flex-col items-center justify-center gap-1 transition-colors duration-200 active:scale-95"
                style={{ color: isActive ? COLORS.primary : COLORS.tertiary }}
              >
                {isActive && (
                  <div
                    className="absolute top-0 left-1/2 -translate-x-1/2"
                    style={{ width: '32px', height: '2px', backgroundColor: COLORS.accent }}
                  />
                )}
                <Icon className="w-5 h-5" />
                <span className="text-xs font-medium">{t.label}</span>
              </button>
            );
          })}
        </div>
      </div>

      <Toast message={toast.message} show={toast.show} />
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
